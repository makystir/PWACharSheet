  // Critical Wound Form state (moved from IIFE to fix React hooks violation)
  const [showCriticalForm, setShowCriticalForm] = useState(false);
  const [criticalLocation, setCriticalLocation] = useState("head");
  const [criticalDescription, setCriticalDescription] = useState("");
  const [criticalEffects, setCriticalEffects] = useState("");
  const [criticalDuration, setCriticalDuration] = useState("permanent");
  const [criticalSeverity, setCriticalSeverity] = useState(10);
  // Advancement Log Archive state (moved from IIFE to fix React hooks violation)
  const [showArchive, setShowArchive] = useState(false);
  // Career Selection Dialog state
  const [showCareerDialog, setShowCareerDialog] = useState(false);
  const [selectedCareer, setSelectedCareer] = useState(null);
  const [expandedClasses, setExpandedClasses] = useState({});
  const timer = useRef(null);
  const fileRef = useRef(null);
  const exportRef = useRef(null);

  const exportData = () => {
    setShowExport(true);
  };

  // Enhanced export with timestamp and file download
  const exportToFile = () => {
    if (!ch) return;
    
    // Create export object with timestamp and version
    const exportObj = {
      ...ch,
      _exportTimestamp: new Date().toISOString(),
      _exportVersion: ch._v || 6
    };
    
    // Generate filename with character name and timestamp
    const timestamp = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
    const charName = (ch.name || 'character').replace(/[^a-z0-9]/gi, '-').toLowerCase();
    const filename = `wfrp4e-${charName}-${timestamp}.json`;
    
    // Create blob and download
    const blob = new Blob([JSON.stringify(exportObj, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    
    setSaveMsg("Exported to file!");
    setTimeout(() => setSaveMsg(""), 2000);
  };

  const copyExport = () => {
    if (exportRef.current) {
      exportRef.current.select();
      document.execCommand("copy");
      setSaveMsg("Copied!");
      setTimeout(() => setSaveMsg(""), 2000);
    }
  };

  const importFromText = () => {
    try {
      const data = JSON.parse(importText);
      
      // Validation: Check if data has required fields (Requirement 19.3)
      if (!data || typeof data !== 'object') {
        setSaveMsg("❌ Invalid data: Not a valid JSON object");
        setTimeout(() => setSaveMsg(""), 5000);
        return;
      }
      
      if (!data.name) {
        setSaveMsg("❌ Invalid data: Missing character name field");
        setTimeout(() => setSaveMsg(""), 5000);
        return;
      }
      
      // Check for required character structure
      if (!data.chars || typeof data.chars !== 'object') {
        setSaveMsg("❌ Invalid data: Missing or invalid characteristics structure");
        setTimeout(() => setSaveMsg(""), 5000);
        return;
      }
      
      // Version validation (Requirement 19.3)
      const importVersion = data._v || data._exportVersion || 0;
      const currentVersion = BLANK_CHARACTER._v || 6;
      
      if (importVersion > currentVersion) {
        setSaveMsg(`❌ Version incompatible: File is v${importVersion}, system supports up to v${currentVersion}`);
        setTimeout(() => setSaveMsg(""), 5000);
        return;
      }
      
      if (importVersion < currentVersion) {
        if (!window.confirm(`⚠️ Version Compatibility Notice\n\nThis character was exported from an older version (v${importVersion}).\nCurrent system version is v${currentVersion}.\n\nImport anyway? Data will be automatically migrated to the current version.`)) {
          return;
        }
      }
      
      // Warning before overwriting
      if (ch && ch.name && ch.name !== 'New Character') {
        if (!window.confirm(`⚠️ Overwrite Warning\n\nThis will replace your current character "${ch.name}" with "${data.name}".\n\nAre you sure you want to continue?`)) {
          return;
        }
      }
      
      // Merge with defaults to ensure all fields exist
      const merged = {...BLANK_CHARACTER, ...data};

            <div style={{fontSize:11,color:"#8a7d6a",margin:"0 0 8px",padding:"8px",background:"rgba(196,169,106,0.1)",borderRadius:4,border:"1px solid rgba(196,169,106,0.2)"}}>
              <div><strong>Character:</strong> {ch.name || 'Unnamed'}</div>
              <div><strong>Version:</strong> {ch._v || 6}</div>
              <div><strong>Export Time:</strong> {new Date().toLocaleString()}</div>
            </div>
            <p style={{fontSize:12,color:"#8a7d6a",margin:"0 0 8px"}}>Download as file or copy JSON to paste elsewhere.</p>
            <textarea ref={exportRef} readOnly value={JSON.stringify({...ch, _exportTimestamp: new Date().toISOString(), _exportVersion: ch._v || 6},null,2)}
              style={{width:"100%",height:250,background:"#0f0d0a",border:"1px solid #3d352a",borderRadius:4,color:"#d4c9b0",padding:10,fontSize:11,fontFamily:"monospace",resize:"vertical"}} />
            <div style={{display:"flex",gap:8,marginTop:10}}>
              <button onClick={exportToFile} style={{
                flex:1,padding:"8px 0",borderRadius:4,cursor:"pointer",
                fontFamily:"'Cinzel',serif",fontSize:12,fontWeight:700,
                background:"linear-gradient(135deg,#2a4a2a,#1a3a1a)",border:"1px solid #3a6a3a",color:"#a0d8a0",
              }}>Download File</button>
              <button onClick={copyExport} style={{
                flex:1,padding:"8px 0",borderRadius:4,cursor:"pointer",
                fontFamily:"'Cinzel',serif",fontSize:12,fontWeight:700,
                background:"linear-gradient(135deg,#3a5a7a,#2a4a6a)",border:"1px solid #4a6a8a",color:"#a0c0d8",
              }}>Copy to Clipboard</button>
              <button onClick={()=>setShowExport(false)} style={{
                flex:1,padding:"8px 0",borderRadius:4,cursor:"pointer",
                fontFamily:"'Cinzel',serif",fontSize:12,fontWeight:700,
                background:"transparent",border:"1px solid #3d352a",color:"#8a7d6a",
              }}>Close</button>
            </div>
          </div>
        </div>
      )}

      {/* IMPORT MODAL */}
      {showImport && (
        <div onClick={()=>{setShowImport(false);setImportText("");}} style={{
          position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",
          display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,
        }}>
          <div onClick={e=>e.stopPropagation()} style={{
            background:"#1a1714",border:"1px solid #4a3f2f",borderRadius:8,
            width:550,maxHeight:"80vh",display:"flex",flexDirection:"column",
            boxShadow:"0 8px 32px rgba(0,0,0,0.5)",padding:16,
          }}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <h3 style={{margin:0,fontFamily:"'Cinzel',serif",fontSize:14,color:"#c4a96a",letterSpacing:1}}>Import Character Data</h3>
              <button onClick={()=>{setShowImport(false);setImportText("");}} style={{background:"none",border:"none",color:"#8a7d6a",fontSize:18,cursor:"pointer"}}>✕</button>
            </div>
            <p style={{fontSize:12,color:"#8a7d6a",margin:"0 0 8px"}}>Paste exported JSON below, or use the file upload button.</p>
            <textarea value={importText} onChange={e=>setImportText(e.target.value)}
              placeholder='Paste JSON here...'
              style={{width:"100%",height:250,background:"#0f0d0a",border:"1px solid #3d352a",borderRadius:4,color:"#d4c9b0",padding:10,fontSize:11,fontFamily:"monospace",resize:"vertical"}} />
            <div style={{display:"flex",gap:8,marginTop:10}}>
              <button onClick={importFromText} style={{
                flex:1,padding:"8px 0",borderRadius:4,cursor:"pointer",
                fontFamily:"'Cinzel',serif",fontSize:12,fontWeight:700,
                background:"linear-gradient(135deg,#2a3a5a,#1a2a4a)",border:"1px solid #3a5a8a",color:"#a0c0e8",
                opacity:importText.trim()?"1":"0.4",
              }}>Import from Paste</button>
              <button onClick={()=>fileRef.current?.click()} style={{
                flex:1,padding:"8px 0",borderRadius:4,cursor:"pointer",
                fontFamily:"'Cinzel',serif",fontSize:12,fontWeight:700,
                background:"transparent",border:"1px solid #3d352a",color:"#8a7d6a",
              }}>Upload .json File</button>
            </div>
          </div>
        </div>
      )}

      {/* HEADER */}
      <div style={{
        background:"linear-gradient(135deg,#1a1510,#2a231a 50%,#1a1510)",
        borderBottom:"2px solid #4a3f2f", padding:"12px 20px",
        display:"flex", alignItems:"center", justifyContent:"space-between",
        position:"sticky", top:0, zIndex:100,
      }}>
        <div>
          <h1 style={{fontFamily:"'Cinzel',serif",fontSize:20,fontWeight:900,color:"#c4a96a",margin:0,letterSpacing:2,textTransform:"uppercase"}}>
            Warhammer Fantasy Roleplay
          </h1>
          <p style={{fontFamily:"'Cinzel',serif",fontSize:11,color:"#8a7d6a",margin:0,letterSpacing:3}}>
            4th Edition Character Sheet
          </p>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <span style={{fontSize:11,color:"#6a8a4a",fontStyle:"italic"}}>{saveMsg}</span>
          {[{p:1,l:"Character"},{p:2,l:"Combat"},{p:3,l:"Estate"},{p:4,l:"Advancement"},{p:5,l:"Other Options"}].map(({p:pg,l}) => (
            <button key={pg} onClick={() => setPage(pg)} style={{
              fontFamily:"'Cinzel',serif",fontSize:11,fontWeight:600,
              padding:"6px 12px",borderRadius:4,cursor:"pointer",
              border:`1px solid ${page===pg?"#c4a96a":"#3d352a"}`,
              background:page===pg?"rgba(196,169,106,.15)":"transparent",
              color:page===pg?"#c4a96a":"#8a7d6a",
            }}>{l}</button>
          ))}
          <input ref={fileRef} type="file" accept=".json" onChange={importData} style={{display:"none"}} />
        </div>
      </div>

      {/* BODY */}
      <div style={{maxWidth:1100,margin:"0 auto",padding:"16px 20px"}}>

        {/* LOG PANEL */}
        {showLog && (
          <div style={{
            background:"rgba(26,23,20,.7)",border:"1px solid #3d352a",
            borderRadius:5,padding:12,marginBottom:14,maxHeight:200,overflowY:"auto",
          }}>
            <h3 style={{fontFamily:"'Cinzel',serif",fontSize:12,color:"#c4a96a",margin:"0 0 8px"}}>Change Log</h3>
            {ch.log.length === 0 ? (
              <p style={{color:"#888",fontStyle:"italic",fontSize:13}}>No changes yet.</p>
            ) : ch.log.map((entry, idx) => (
              <div key={idx} style={{
                display:"flex",gap:10,padding:"2px 0",
                borderBottom:"1px solid rgba(61,53,42,.2)",fontSize:12,
              }}>
                <span style={{color:"#5a5040",fontSize:10,whiteSpace:"nowrap",minWidth:130}}>
                  {new Date(entry.t).toLocaleString()}
                </span>
                <span style={{color:"#a89878"}}>{entry.x}</span>
              </div>
            ))}
          </div>
        )}

        {/* PAGE 1 */}
        {page === 1 && (
          <div>
              <SH t="Personal Details" />
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
                  <LI l="Name" v={ch.name} o={v=>up("name",v)} />
                  <div style={{display:"flex",flexDirection:"column",gap:2,marginBottom:4}}>
                    <label style={{fontSize:11,color:"#8a7d6a",fontFamily:"'Cinzel',serif",letterSpacing:1,textTransform:"uppercase"}}>Species</label>
                    <select value={ch.species} onChange={e=>{
                      const newSpecies = e.target.value;
                      const oldSpecies = ch.species;
                      if (oldSpecies && oldSpecies !== newSpecies) {
                        if (!window.confirm("Changing species will reset all species-derived values (characteristics, movement, fate, resilience). Continue?")) {
                          e.target.value = oldSpecies;
                          return;
                        }
                      }
                      if (newSpecies === "") {
                        const next = clearSpeciesData(ch);
                        setCh(next);
                        save(next);
                        addLog("Species cleared");
                      } else {
                        const next = applySpeciesData(ch, newSpecies);
                        setCh(next);
                        save(next);
                        addLog("Species set to " + newSpecies);
                      }
                    }}
                      style={{background:"rgba(26,23,20,.8)",border:"1px solid #3d352a",borderRadius:3,color:"#d4c9b0",padding:"5px 8px",fontSize:14,width:"100%",fontFamily:"inherit",cursor:"pointer"}}>
                      {SPECIES_OPTIONS.map(s => <option key={s} value={s} style={{background:"#1a1714",color:"#d4c9b0"}}>{s || "— Select Species —"}</option>)}
                    </select>
                  </div>
                  {/* Class Dropdown */}
                  <div style={{display:"flex",flexDirection:"column",gap:2,marginBottom:4}}>
                    <label style={{fontSize:11,color:"#8a7d6a",fontFamily:"'Cinzel',serif",letterSpacing:1,textTransform:"uppercase"}}>Class</label>
                    <select
                      value={ch.class || ""}
                      onChange={handleClassChange}
                      style={{background:"rgba(26,23,20,.8)",border:"1px solid #3d352a",borderRadius:3,color:"#d4c9b0",padding:"5px 8px",fontSize:14,width:"100%",fontFamily:"inherit",cursor:"pointer"}}
                    >
                      {CLASS_OPTIONS.map(c => (
                        <option key={c} value={c} style={{background:"#1a1714",color:"#d4c9b0"}}>
                          {c || "— Select Class —"}
                        </option>
                      ))}
                    </select>
                  </div>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
                  {/* Career Dropdown (filtered by class) */}
                  <div style={{display:"flex",flexDirection:"column",gap:2,marginBottom:4}}>
                    <label style={{fontSize:11,color:"#8a7d6a",fontFamily:"'Cinzel',serif",letterSpacing:1,textTransform:"uppercase"}}>Career</label>
                    <select
                      value={ch.career || ""}
                      onChange={handleCareerChange}
                      disabled={!ch.class}
                      style={{background:"rgba(26,23,20,.8)",border:"1px solid #3d352a",borderRadius:3,color:"#d4c9b0",padding:"5px 8px",fontSize:14,width:"100%",fontFamily:"inherit",cursor: ch.class ? "pointer" : "not-allowed",opacity: ch.class ? 1 : 0.6}}
                    >
                      <option value="" style={{background:"#1a1714",color:"#d4c9b0"}}>— Select Career —</option>
                      {getCareersByClass(ch.class).map(c => (
                        <option key={c} value={c} style={{background:"#1a1714",color:"#d4c9b0"}}>{c}</option>
                      ))}
                    </select>
                  </div>
                  {/* Career Level Dropdown */}
                  <div style={{display:"flex",flexDirection:"column",gap:2,marginBottom:4}}>
                    <label style={{fontSize:11,color:"#8a7d6a",fontFamily:"'Cinzel',serif",letterSpacing:1,textTransform:"uppercase"}}>Career Level</label>
                    <select
                      value={ch.careerLevel || ""}
                      onChange={handleLevelChange}
                      disabled={!ch.career}
                      style={{background:"rgba(26,23,20,.8)",border:"1px solid #3d352a",borderRadius:3,color:"#d4c9b0",padding:"5px 8px",fontSize:14,width:"100%",fontFamily:"inherit",cursor: ch.career ? "pointer" : "not-allowed",opacity: ch.career ? 1 : 0.6}}
                    >
                      <option value="" style={{background:"#1a1714",color:"#d4c9b0"}}>— Select Level —</option>
                      {getCareerLevelOptions(ch.career).map(opt => (
                        <option key={opt.value} value={opt.value} style={{background:"#1a1714",color:"#d4c9b0"}}>{opt.label}</option>
                      ))}
                    </select>
                  </div>
                  {/* Status Field (read-only) */}
                  <div style={{display:"flex",flexDirection:"column",gap:2,marginBottom:4}}>
                    <label style={{fontSize:11,color:"#8a7d6a",fontFamily:"'Cinzel',serif",letterSpacing:1,textTransform:"uppercase"}}>Status</label>
                    <input
                      value={ch.status || ""}
                      readOnly
                      style={{background:"rgba(26,23,20,.8)",border:"1px solid #3d352a",borderRadius:3,color:"#d4c9b0",padding:"5px 8px",fontSize:14,width:"100%",cursor:"not-allowed",opacity:0.8}}
                    />
                  </div>
                </div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:8}}>
                <LI l="Age" v={ch.age} o={v=>up("age",v)} />
                <LI l="Height" v={ch.height} o={v=>up("height",v)} />
                <LI l="Eyes" v={ch.eyes} o={v=>up("eyes",v)} />
                <LI l="Hair" v={ch.hair} o={v=>up("hair",v)} />
              </div>
              <LI l="Career Path" v={ch.careerPath} o={v=>up("careerPath",v)} />

              {/* CHARACTERISTICS */}
              <SH t="Characteristics" />
              <table style={{width:"100%",borderCollapse:"collapse"}}>
                <thead>
                  <tr>
                    <td style={{width:70}}></td>
                    {CA.map(a => (
                      <th key={a} style={{fontFamily:"'Cinzel',serif",fontSize:11,fontWeight:700,color:"#c4a96a",textAlign:"center",padding:"4px 2px",borderBottom:"1px solid #3d352a"}}>
                        <CharacteristicCell abbr={a}>
                          {a}
                        </CharacteristicCell>
                      </th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {["Initial","Advances","Bonus","Current"].map(row => (
                    <tr key={row}>
                      <td style={{fontFamily:"'Cinzel',serif",fontSize:10,color:"#8a7d6a",textAlign:"right",paddingRight:6,textTransform:"uppercase",letterSpacing:1}}>{row}</td>
                      {CA.map(a => (
                        <td key={a} style={{textAlign:"center",padding:2,borderBottom:"1px solid rgba(61,53,42,.4)"}}>
                          {row === "Current" ? (
                            <span style={{fontWeight:700,fontSize:15,color:"#c4a96a"}}>{getC(a)}</span>
                          ) : row === "Bonus" ? (() => {
                            const computedBonus = computeTalentBonuses(ch.talents || [])[a] || 0;
                            const isOverridden = !!(ch.charBonusOverrides && ch.charBonusOverrides[a]) && (ch.chars[a].b || 0) !== computedBonus;
                            return (
                              <div style={{position:"relative",display:"inline-block"}}>
                                <input
                                  type="number"
                                  value={ch.chars[a].b || ""}
                                  onChange={e => {
                                    const val = parseInt(e.target.value)||0;
                                    setCh(prev => {
                                      const next = JSON.parse(JSON.stringify(prev));
                                      next.chars[a].b = val;
                                      next.charBonusOverrides = {...(next.charBonusOverrides || {}), [a]: true};
                                      save(next);
                                      return next;
                                    });
                                  }}
                                  style={{
                                    background:"rgba(26,23,20,.8)",
                                    border: isOverridden ? "1px solid #d4a017" : "1px solid #3d352a",
                                    borderRadius:3,width:36,padding:"4px 2px",fontSize:14,
                                    textAlign:"center",
                                    color:"#5ec4d4",
                                  }}
                                />
                                {isOverridden && (
                                  <span
                                    title="Reset to computed bonus"
                                    onClick={() => {
                                      setCh(prev => {
                                        const next = JSON.parse(JSON.stringify(prev));
                                        next.chars[a].b = computedBonus;
                                        next.charBonusOverrides = {...(next.charBonusOverrides || {}), [a]: false};
                                        save(next);
                                        return next;
                                      });
                                    }}
                                    style={{
                                      position:"absolute",top:-6,right:-6,
                                      width:14,height:14,borderRadius:"50%",
                                      background:"#d4a017",color:"#1a1714",
                                      fontSize:10,lineHeight:"14px",textAlign:"center",
                                      cursor:"pointer",fontWeight:700,
                                    }}
                                  >↺</span>
                                )}
                              </div>
                            );
                          })() : (
                            <input
                              type="number"
                              value={ch.chars[a][row==="Initial"?"i":"a"] || ""}
                              onChange={e => {
                                const field = row==="Initial"?"i":"a";
                                const val = parseInt(e.target.value)||0;
                                up(`chars.${a}.${field}`, val);
                                if (field === "a") addLog(`${a} adv → ${val}`);
                              }}
                              style={{
                                background:"rgba(26,23,20,.8)",border:"1px solid #3d352a",
                                borderRadius:3,width:36,padding:"4px 2px",fontSize:14,
                                textAlign:"center",
                                color:row==="Advances"?"#e8c44a":"#d4c9b0",
                              }}
                            />
                          )}
                        </td>
                      ))}
                    </tr>
                  ))}
                </tbody>
              </table>
            
              {/* FATE / RESILIENCE / XP / MOVEMENT */}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:10}}>
              <MiniBox title="Fate">
                <div style={{display:"flex",gap:8,justifyContent:"center"}}>
                  <NF l="Fate" v={ch.fate} o={v=>up("fate",+v||0)} />
                  <NF l="Fortune" v={ch.fortune} o={v=>up("fortune",+v||0)} />
                </div>
                {ch.speciesExtraPoints > 0 && (
                  <div style={{textAlign:"center",marginTop:4,fontSize:10,color:"#c4a96a",fontFamily:"'Cinzel',serif",letterSpacing:1}}>
                    Extra Pts: {ch.speciesExtraPoints}
                  </div>
                )}
              </MiniBox>
              <MiniBox title="Resilience">
                <div style={{display:"flex",gap:8,justifyContent:"center"}}>
                  <NF l="Res" v={ch.resilience} o={v=>up("resilience",+v||0)} />
                  <NF l="Rslv" v={ch.resolve} o={v=>up("resolve",+v||0)} />
                </div>
              </MiniBox>
              <MiniBox title="Experience">
                <div style={{display:"flex",gap:6,justifyContent:"center"}}>
                  <NF l="Cur" v={ch.xpCur} o={v=>up("xpCur",+v||0)} />
                  <NF l="Spent" v={ch.xpSpent} o={v=>up("xpSpent",+v||0)} />
                  <NF l="Total" v={ch.xpCur + ch.xpSpent} />
                </div>
              </MiniBox>
              <MiniBox title="Movement">
                <div style={{display:"flex",gap:6,justifyContent:"center"}}>
                  <NF l="M" v={ch.move.m} o={v=>up("move.m",+v||0)} />
                  <NF l="Walk" v={ch.move.w} o={v=>up("move.w",+v||0)} />
                  <NF l="Run" v={ch.move.r} o={v=>up("move.r",+v||0)} />
                </div>
              </MiniBox>
            </div>
            
            {/* SKILLS */}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1.2fr",gap:12}}>
              <div>
                <SH t="Basic Skills" />
                <SkillBlock skills={ch.bSkills.slice(0,13)} getC={getC}
                  onChange={(i,f,v)=>{up(`bSkills.${i}.${f}`,f==="a"?+v||0:v); if(f==="a") addLog(`${ch.bSkills[i].n} adv→${v}`);}} />
              </div>
              <div>
                <SH t="Basic Skills" />
                <SkillBlock skills={ch.bSkills.slice(13)} getC={getC}
                  onChange={(i,f,v)=>{const idx=i+13; up(`bSkills.${idx}.${f}`,f==="a"?+v||0:v); if(f==="a") addLog(`${ch.bSkills[idx].n} adv→${v}`);}} />
              </div>
              <div>
                <SH t="Advanced Skills" />
                <SkillBlock skills={ch.aSkills} getC={getC} editable
                  onChange={(i,f,v)=>up(`aSkills.${i}.${f}`,f==="a"?+v||0:v)}
                  onRemove={(i)=>{const n=[...ch.aSkills];const nm=n[i].n;n.splice(i,1);up("aSkills",n);if(nm)addLog("Removed skill: "+nm);}} />
                <AddBtn label="Add Skill from Rulebook" onClick={() => setPicker(
                  <Picker title="Select Advanced Skill" items={ADV_SKILL_DB.map(s=>({name:s.n,char:s.c}))}
                    onClose={() => setPicker(null)}
                    onSelect={s => { up("aSkills",[...ch.aSkills,{n:s.name,c:s.char,a:0}]); addLog("Added skill: "+s.name); }}
                    renderItem={s => <div style={{display:"flex",justifyContent:"space-between",width:"100%"}}>
                      <span style={{fontWeight:600}}>{s.name}</span>
                      <span style={{color:"#8a7d6a",fontSize:11}}>{s.char}</span>
                    </div>}
                  />
                )} />
                <AddBtn label="Add Custom Skill" onClick={()=>up("aSkills",[...ch.aSkills,{n:"",c:"",a:0}])} />
              </div>
            </div>
            
            {/* TALENTS */}
            <SH t="Talents" />
            {ch.talents.map((tal, i) => (
              <div key={i} style={{display:"flex",gap:4,alignItems:"center",marginBottom:2}}>
                <input style={inp(2)} placeholder="Name" value={tal.n} onChange={e=>up(`talents.${i}.n`,e.target.value)} />
                <input type="number" style={{...numInp,width:36}} value={tal.t||""} onChange={e=>up(`talents.${i}.t`,+e.target.value||0)} />
                <input style={inp(3)} placeholder="Description" value={tal.d} onChange={e=>up(`talents.${i}.d`,e.target.value)} />
                <RmBtn onClick={()=>{const n=[...ch.talents];n.splice(i,1);const next=syncTalentBonuses({...ch,talents:n});setCh(next);save(next);}} />
              </div>
            ))}
            <AddBtn label="Add Talent from Rulebook" onClick={() => setPicker(
              <Picker title="Select Talent" items={TALENT_DB}
                onClose={() => setPicker(null)}
                onSelect={t => { const next=syncTalentBonuses({...ch,talents:[...ch.talents,{n:t.name,t:1,d:t.desc}]}); setCh(next); save(next); addLog("Added talent: "+t.name); }}
                renderItem={t => <div style={{display:"flex",flexDirection:"column",gap:2,width:"100%"}}>
                  <div style={{display:"flex",justifyContent:"space-between"}}>
                    <span style={{fontWeight:600}}>{t.name}</span>
                    <span style={{color:"#8a7d6a",fontSize:11}}>Max: {t.max}</span>
                  </div>
                  <span style={{color:"#7a7060",fontSize:11}}>{t.desc}</span>
                </div>}
              />
            )} />
            <AddBtn label="Add Custom Talent" onClick={()=>up("talents",[...ch.talents,{n:"",t:0,d:""}])} />

            {/* AMBITIONS & PARTY */}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
              <div>
                <SH t="Ambitions" />
                <LI l="Short-term" v={ch.ambS} o={v=>up("ambS",v)} />
                <LI l="Long-term" v={ch.ambL} o={v=>up("ambL",v)} />
              </div>
              <div>
                <SH t="Party" />
                <LI l="Name" v={ch.partyN} o={v=>up("partyN",v)} />
                <LI l="Members" v={ch.partyM} o={v=>up("partyM",v)} />
              </div>
            </div>
            
            {/* TRAPPINGS */}
            <SH t="Trappings" />
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:3}}>
              {ch.trappings.map((t,i) => (
                <div key={i} style={{display:"flex",gap:3,alignItems:"center"}}>

            {/* WEAPONS */}

            {(() => {
              const RANGED_GROUPS = ["Bow","Blackpowder","Crossbow","Sling","Throwing","Entangling","Engineering","Explosives"];
              const SB = Math.floor(getC("S") / 10);
              const halfSB = Math.floor(SB / 2);

              const getTalentLevel = (name) => {
                const t = ch.talents.find(t => t.n && t.n.toLowerCase().startsWith(name.toLowerCase()));
                return t ? (t.t || 1) : 0;
              };
              const accurateShot = getTalentLevel("Accurate Shot");
              const sureShot = getTalentLevel("Sure Shot");
              const strikeMighty = getTalentLevel("Strike Mighty Blow");
              const dirtyFighting = getTalentLevel("Dirty Fighting");

              const calcDamage = (w) => {
                if (!w.damage || w.damage === "—") return {num:null,bonuses:[],notes:[]};
                const ranged = RANGED_GROUPS.includes(w.group);
                const melee = !ranged;
                let base = w.damage;
                let num = 0;
                let bonuses = [];
                let notes = [];

                // Parse: 1/2SB+X (errata bows/slings/thrown)
                if (base.includes("1/2SB")) {
                  num = halfSB;
                  bonuses.push(`\u00BDSB ${halfSB}`);
                  const m = base.match(/1\/2SB\+(\d+)/);
                  if (m) { num += parseInt(m[1]); bonuses.push(`base +${m[1]}`); }
                }
                // Parse: +SB+X (melee)
                else if (base.includes("SB")) {
                  num = SB;
                  bonuses.push(`SB ${SB}`);
                  const m = base.match(/SB\+(\d+)/);
                  if (m) { num += parseInt(m[1]); bonuses.push(`base +${m[1]}`); }
                }
                // Parse: +X (flat damage, crossbows/blackpowder)
                else {
                  const m = base.match(/\+?(\d+)/);
                  if (m) { num = parseInt(m[1]); bonuses.push(`base +${m[1]}`); }
                }

                // Talent bonuses
                if (ranged && accurateShot > 0) { num += accurateShot; bonuses.push(`Accurate Shot +${accurateShot}`); }
                if (ranged && sureShot > 0) { num += sureShot; bonuses.push(`Sure Shot +${sureShot}`); }
                if (melee && strikeMighty > 0) { num += strikeMighty; bonuses.push(`Strike Mighty +${strikeMighty}`); }
                if (w.group === "Brawling" && dirtyFighting > 0) { num += dirtyFighting; bonuses.push(`Dirty Fighting +${dirtyFighting}`); }

                // Combat notes
                if (ranged && getTalentLevel("Deadeye Shot")) notes.push("Choose hit loc");
                if (ranged && getTalentLevel("Fast Shot")) notes.push("Fire before init");
                if (ranged && getTalentLevel("Sharpshooter")) notes.push("Ignore size penalty");
                if (ranged && getTalentLevel("Marksman")) notes.push("BS+5 (in char)");

                return {num, bonuses, notes};
              };

              const isRanged = (w) => RANGED_GROUPS.includes(w.group);

              return (
                <>
                <table style={tblStyle}><thead><tr>
                  {["Name","Group","Enc","Reach/Opt","Max R","Mod","Dmg","Eff.","Breakdown","Qualities",""].map(h=>
                    <th key={h} style={{...thStyle, ...(h==="Eff."?{color:"#e8c44a"}:{}), fontSize:9}}>{h}</th>
                  )}
                </tr></thead><tbody>
                  {ch.weapons.map((w,i)=>{
                    const calc = calcDamage(w);
                    const ranged = isRanged(w);
                    // Check if this weapon would be affected by melee distance penalty
                    const isPistol = w.name && (
                      w.name.toLowerCase().includes("pistol") ||
                      (w.group === "Blackpowder" && w.rangeReach && parseInt(w.rangeReach) <= 8)
                    );
                    const affectedByMeleePenalty = ranged && ch.combatState.engaged && !isPistol;
                    
                    return (
                    <tr key={i} style={{
                      background: affectedByMeleePenalty ? "rgba(138,58,42,.15)" : undefined,
                    }}>
                      <td style={tdS}>
                        <div style={{display:"flex",alignItems:"center",gap:4}}>
                          {affectedByMeleePenalty && (
                            <span style={{fontSize:14,color:"#e8a84a"}} title="Ranged weapon at melee distance: -20 to hit, requires Cool test">⚠</span>
                          )}
                          <input style={tIn} value={w.name} onChange={e=>up(`weapons.${i}.name`,e.target.value)}/>
                        </div>
                      </td>
                      <td style={tdSm}><input style={{...tInSm,fontSize:10}} value={w.group} onChange={e=>up(`weapons.${i}.group`,e.target.value)}/></td>
                      <td style={{...tdSm,width:30}}><input style={tInSm} value={w.enc} onChange={e=>up(`weapons.${i}.enc`,e.target.value)}/></td>
                      <td style={tdSm}><input style={{...tInSm,fontSize:10}} value={ranged?(w.optR||""):(w.rangeReach||"")} onChange={e=>{
                        if(ranged) up(`weapons.${i}.optR`,e.target.value);
                        else up(`weapons.${i}.rangeReach`,e.target.value);
                      }}/></td>
                      <td style={{...tdSm,width:42}}><input style={{...tInSm,fontSize:10}} value={w.maxR||""} onChange={e=>up(`weapons.${i}.maxR`,e.target.value)}/></td>
                      <td style={{...tdSm,width:30}}><input style={{...tInSm,fontSize:10}} value={w.rangeMod||""} onChange={e=>up(`weapons.${i}.rangeMod`,e.target.value)}/></td>
                      <td style={{...tdSm,width:55}}><input style={{...tInSm,fontSize:10}} value={w.damage} onChange={e=>up(`weapons.${i}.damage`,e.target.value)}/></td>
                      <td style={{...tdSm,width:36,textAlign:"center"}}>
                        {calc.num !== null ? (
                          <span style={{fontWeight:900,fontSize:16,color:"#e8c44a",fontFamily:"'Cinzel',serif"}}>+{calc.num}</span>
                        ) : <span style={{color:"#6a5d4a"}}>—</span>}
                      </td>
                      <td style={tdS}>
                        <div style={{fontSize:9,color:"#8a9a6a",lineHeight:1.3}}>
                          {calc.bonuses.join(" + ")}
                          {calc.notes.length > 0 && (
                            <div style={{color:"#7a8aaa",marginTop:1}}>{calc.notes.join(" \u00B7 ")}</div>
                          )}
                          {affectedByMeleePenalty && (
                            <div style={{color:"#e8a84a",marginTop:2,fontWeight:600}}>
                              -20 to hit (melee) • Cool test required
                            </div>
                          )}
                        </div>
                      </td>
                      <td style={tdS}><input style={{...tIn,fontSize:10}} value={w.qualities} onChange={e=>up(`weapons.${i}.qualities`,e.target.value)}/></td>
                      <td style={{...tdSm,width:22}}><RmBtn onClick={()=>{const n=[...ch.weapons];const nm=n[i].name;n.splice(i,1);up("weapons",n);addLog("Removed weapon: "+nm);}}/></td>
                    </tr>
                  );})}
                </tbody></table>
                <div style={{fontSize:9,color:"#5a5040",fontStyle:"italic",padding:"4px 6px",marginBottom:4}}>
                  Eff. = base dmg + \u00BDSB or SB + talent bonuses. Final Damage = Eff. + your attack SL. &nbsp;|&nbsp; Reach/Opt = melee reach or ranged optimum range. Max R = maximum range. Mod = penalty per range band beyond optimum.
                  {ch.combatState.engaged && (
                    <span style={{color:"#e8a84a",fontWeight:600}}> &nbsp;|&nbsp; ⚠ Non-pistol ranged weapons at melee distance: -20 to hit, Cool test required.</span>
                  )}
                </div>
                </>
              );
            })()}
            <AddBtn label="Add Weapon from Rulebook" onClick={() => setPicker(
              <Picker title="Select Weapon" items={WEAPONS}
                onClose={() => setPicker(null)}
                onSelect={w => { up("weapons",[...ch.weapons,{...w}]); addLog("Added weapon: "+w.name); }}
                renderItem={w => <div style={{display:"flex",flexDirection:"column",gap:2,width:"100%"}}>
                  <div style={{display:"flex",justifyContent:"space-between"}}>
                    <span style={{fontWeight:600}}>{w.name}</span>
                    <span style={{color:"#8a7d6a",fontSize:11}}>{w.group}</span>
                  </div>
                  <div style={{fontSize:10,color:"#7a7060"}}>
                    Dmg: {w.damage}{w.maxR ? ` | Opt: ${w.optR} | Max: ${w.maxR}` : w.rangeReach ? ` | Reach: ${w.rangeReach}` : ""} | {w.qualities}
                  </div>
                </div>}
              />
            )} />
            <AddBtn label="Add Custom Weapon" onClick={()=>{up("weapons",[...ch.weapons,{name:"",group:"",enc:"0",damage:"",rangeReach:"",maxR:"",optR:"",rangeMod:"",qualities:""}]);}} />

          </div>
        )}

        {/* PAGE 3 — ESTATE */}
        {page === 3 && (
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            {(() => {
              const est = ch.estate || {name:"",location:"",description:"",treasury:{d:0,ss:0,gc:0},monthlyIncome:{d:0,ss:0,gc:0},monthlyExpenses:{d:0,ss:0,gc:0},ledger:[],notes:[],holdings:[]};
              const ue = (path, val) => up(`estate.${path}`, val);

              const addLedgerEntry = () => {
                if (!ledgerForm || !ledgerForm.desc) return;
                const entry = {id:Date.now(),date:new Date().toISOString(),type:ledgerForm.type,desc:ledgerForm.desc,amount:ledgerForm.amount||"—"};
                ue("ledger", [entry, ...(est.ledger||[])]);
                addLog(`Estate ${ledgerForm.type}: ${ledgerForm.desc} (${ledgerForm.amount||"—"})`);
                setLedgerForm(null);
              };

              const addNote = () => {
                if (!noteInput.trim()) return;
                ue("notes", [{id:Date.now(),date:new Date().toISOString(),text:noteInput.trim()}, ...(est.notes||[])]);
                addLog("Estate note added");
                setNoteInput("");
              };

              const addHolding = () => {
                if (!holdingInput.trim()) return;
                ue("holdings",[...(est.holdings||[]),{name:holdingInput.trim(),status:"Active",income:"",notes:""}]);
                addLog("Added holding: "+holdingInput.trim());
                setHoldingInput("");
              };

              const collectMonth = () => {
                const inc = est.monthlyIncome||{d:0,ss:0,gc:0};
                const exp = est.monthlyExpenses||{d:0,ss:0,gc:0};
                const t = est.treasury||{d:0,ss:0,gc:0};
                const n = {
                  d:(t.d||0)+(inc.d||0)-(exp.d||0),
                  ss:(t.ss||0)+(inc.ss||0)-(exp.ss||0),
                  gc:(t.gc||0)+(inc.gc||0)-(exp.gc||0),
                };
                while(n.d>=12){n.d-=12;n.ss+=1;}
                while(n.d<0&&n.ss>0){n.d+=12;n.ss-=1;}
                while(n.ss>=20){n.ss-=20;n.gc+=1;}
                while(n.ss<0&&n.gc>0){n.ss+=20;n.gc-=1;}
                ue("treasury",n);
                const entry = {id:Date.now(),date:new Date().toISOString(),type:"Monthly",
                  desc:`Collected: +${inc.gc||0}gc ${inc.ss||0}ss ${inc.d||0}d | Expenses: -${exp.gc||0}gc ${exp.ss||0}ss ${exp.d||0}d`,
                  amount:`Net → ${n.gc}gc ${n.ss}ss ${n.d}d`};
                ue("ledger",[entry,...(est.ledger||[])]);
                addLog(`Estate monthly settled. Treasury: ${n.gc}gc ${n.ss}ss ${n.d}d`);
              };

              const treasuryInPennies = ((est.treasury||{}).gc||0)*240+((est.treasury||{}).ss||0)*12+((est.treasury||{}).d||0);

              return (
                <>
                {/* Estate Header */}
                <div style={{
                  background:"linear-gradient(135deg,rgba(40,30,15,.7),rgba(25,20,10,.9))",
                  border:"1px solid #5a4a2f",borderRadius:8,padding:"16px 20px",
                }}>
                  <h2 style={{fontFamily:"'Cinzel',serif",fontSize:18,fontWeight:900,color:"#c4a96a",margin:"0 0 12px",letterSpacing:2,textTransform:"uppercase"}}>
                    Estate & Holdings
                  </h2>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                    <LI l="Estate Name" v={est.name||""} o={v=>ue("name",v)} />
                    <LI l="Location" v={est.location||""} o={v=>ue("location",v)} />
                  </div>
                  <div style={{marginTop:4}}>
                    <label style={{fontSize:11,color:"#8a7d6a",fontFamily:"'Cinzel',serif",letterSpacing:1,textTransform:"uppercase"}}>Description</label>
                    <textarea value={est.description||""} onChange={e=>ue("description",e.target.value)}
                      placeholder="Describe the estate, its history, current state..."
                      style={{width:"100%",background:"rgba(15,13,10,.5)",border:"1px solid #3d352a",borderRadius:3,color:"#d4c9b0",padding:"6px 8px",fontSize:13,minHeight:60,resize:"vertical",fontFamily:"'Crimson Text',serif"}} />
                  </div>
                </div>

                <div>
                    
                {/* Treasury / Income / Expenses */}
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:14}}>
                  <div style={{background:"linear-gradient(135deg,rgba(30,35,20,.6),rgba(20,25,10,.8))",border:"1px solid #4a5a2f",borderRadius:6,padding:"10px 14px"}}>
                    <div style={{fontFamily:"'Cinzel',serif",fontSize:12,fontWeight:700,color:"#a0c060",letterSpacing:1,textTransform:"uppercase",marginBottom:8,textAlign:"center"}}>Treasury</div>
                    <div style={{display:"flex",gap:8,justifyContent:"center",marginBottom:6}}>
                      <NF l="GC" v={(est.treasury||{}).gc||0} o={v=>ue("treasury.gc",+v||0)} />
                      <NF l="SS" v={(est.treasury||{}).ss||0} o={v=>ue("treasury.ss",+v||0)} />
                      <NF l="D" v={(est.treasury||{}).d||0} o={v=>ue("treasury.d",+v||0)} />
                    </div>
                    <div style={{textAlign:"center",fontSize:10,color:"#6a7a4a"}}>{treasuryInPennies} brass pennies total</div>
                  </div>
                  <MiniBox title="Monthly Income">
                    <div style={{display:"flex",gap:6,justifyContent:"center"}}>
                      <NF l="GC" v={(est.monthlyIncome||{}).gc||0} o={v=>ue("monthlyIncome.gc",+v||0)} />
                      <NF l="SS" v={(est.monthlyIncome||{}).ss||0} o={v=>ue("monthlyIncome.ss",+v||0)} />
                      <NF l="D" v={(est.monthlyIncome||{}).d||0} o={v=>ue("monthlyIncome.d",+v||0)} />
                    </div>
                  </MiniBox>
                  <MiniBox title="Monthly Expenses">
                    <div style={{display:"flex",gap:6,justifyContent:"center"}}>
                      <NF l="GC" v={(est.monthlyExpenses||{}).gc||0} o={v=>ue("monthlyExpenses.gc",+v||0)} />
                      <NF l="SS" v={(est.monthlyExpenses||{}).ss||0} o={v=>ue("monthlyExpenses.ss",+v||0)} />
                      <NF l="D" v={(est.monthlyExpenses||{}).d||0} o={v=>ue("monthlyExpenses.d",+v||0)} />
                    </div>
                  </MiniBox>
                </div>

                {/* Collect Button */}
                <button onClick={collectMonth} style={{
                  width:"100%",padding:"10px 0",borderRadius:5,cursor:"pointer",
                  fontFamily:"'Cinzel',serif",fontSize:13,fontWeight:700,letterSpacing:2,
                  background:"linear-gradient(135deg,#3a4a2a,#2a3a1a)",border:"1px solid #5a7a3a",color:"#c0e890",textTransform:"uppercase",
                }}>Collect Monthly Income & Pay Expenses</button>
                
                {/* Holdings */}
                <SH t="Holdings & Properties" />
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                  {(est.holdings||[]).map((h,i) => (
                    <div key={i} style={{background:"rgba(26,23,20,.6)",border:"1px solid #3d352a",borderRadius:5,padding:"10px 12px"}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                        <input value={h.name} onChange={e=>{const n=[...(est.holdings||[])];n[i]={...n[i],name:e.target.value};ue("holdings",n);}}
                          style={{background:"transparent",border:"none",color:"#c4a96a",fontFamily:"'Cinzel',serif",fontSize:14,fontWeight:700,padding:0,width:"60%"}} />
                        <RmBtn onClick={()=>{const n=[...(est.holdings||[])];const nm=n[i].name;n.splice(i,1);ue("holdings",n);addLog("Removed holding: "+nm);}} />
                      </div>
                      <div style={{display:"flex",gap:8,marginBottom:4}}>
                        <div style={{flex:1}}>
                          <label style={{fontSize:9,color:"#8a7d6a",fontFamily:"'Cinzel',serif",letterSpacing:1,textTransform:"uppercase"}}>Status</label>
                          <select value={h.status||"Active"} onChange={e=>{const n=[...(est.holdings||[])];n[i]={...n[i],status:e.target.value};ue("holdings",n);}}
                            style={{width:"100%",background:"#1a1714",color:h.status==="Damaged"?"#e88a5a":h.status==="Destroyed"?"#e85a5a":"#8ac060",border:"1px solid #3d352a",borderRadius:3,fontSize:12,padding:"3px 6px"}}>
                            <option value="Active">Active</option>
                            <option value="Under Construction">Under Construction</option>
                            <option value="Damaged">Damaged</option>
                            <option value="Destroyed">Destroyed</option>
                            <option value="Abandoned">Abandoned</option>
                          </select>
                        </div>
                        <div style={{flex:1}}>
                          <label style={{fontSize:9,color:"#8a7d6a",fontFamily:"'Cinzel',serif",letterSpacing:1,textTransform:"uppercase"}}>Income</label>
                          <input value={h.income||""} onChange={e=>{const n=[...(est.holdings||[])];n[i]={...n[i],income:e.target.value};ue("holdings",n);}}
                            placeholder="e.g. 2ss/month"
                            style={{width:"100%",background:"rgba(26,23,20,.8)",border:"1px solid #3d352a",borderRadius:3,color:"#d4c9b0",fontSize:12,padding:"3px 6px"}} />
                        </div>
                      </div>
                      <textarea value={h.notes||""} onChange={e=>{const n=[...(est.holdings||[])];n[i]={...n[i],notes:e.target.value};ue("holdings",n);}}
                        placeholder="Notes about this holding..."
                        style={{width:"100%",background:"rgba(15,13,10,.5)",border:"none",borderTop:"1px solid rgba(61,53,42,.3)",color:"#a89878",fontSize:11,padding:"4px 6px",minHeight:36,resize:"vertical",fontFamily:"'Crimson Text',serif"}} />
                    </div>
                  ))}
                </div>
                <div style={{display:"flex",gap:6,marginTop:4}}>
                  <input value={holdingInput} onChange={e=>setHoldingInput(e.target.value)}
                    placeholder="New holding name (e.g. Mill, Farm, Inn)..."
                    onKeyDown={e=>{if(e.key==="Enter")addHolding();}}
                    style={{flex:1,background:"rgba(26,23,20,.8)",border:"1px solid #3d352a",borderRadius:3,color:"#d4c9b0",padding:"6px 10px",fontSize:13,fontFamily:"'Crimson Text',serif"}} />
                  <button onClick={addHolding} style={{
                    padding:"6px 14px",borderRadius:4,cursor:"pointer",
                    fontFamily:"'Cinzel',serif",fontSize:11,fontWeight:700,
                    background:"linear-gradient(135deg,#2a3a2a,#1a2a1a)",border:"1px solid #3a5a3a",color:"#a0d8a0",
                    opacity:holdingInput.trim()?"1":"0.4",
                  }}>+ Add</button>
                </div>
                
                {/* Ledger */}
                <SH t="Financial Ledger" />
                <div style={{display:"flex",gap:6,marginBottom:8}}>
                  {[{t:"Income",bg:"#2a4a2a,#1a3a1a",bc:"#3a6a3a",c:"#a0d8a0"},{t:"Expense",bg:"#4a2a2a,#3a1a1a",bc:"#6a3a3a",c:"#d8a0a0"},{t:"Event",bg:"#2a3a4a,#1a2a3a",bc:"#3a5a7a",c:"#a0c0d8"}].map(b=>(
                    <button key={b.t} onClick={()=>setLedgerForm(ledgerForm&&ledgerForm.type===b.t?null:{type:b.t,desc:"",amount:""})} style={{
                      flex:1,padding:"6px 0",borderRadius:4,cursor:"pointer",
                      fontFamily:"'Cinzel',serif",fontSize:11,fontWeight:700,letterSpacing:1,
                      background:`linear-gradient(135deg,${b.bg})`,border:`1px solid ${b.bc}`,color:b.c,
                      opacity:ledgerForm&&ledgerForm.type===b.t?"1":"0.7",
                    }}>+ {b.t}</button>
                  ))}
                </div>
                {ledgerForm && (
                  <div style={{display:"flex",gap:6,marginBottom:8,alignItems:"center",background:"rgba(26,23,20,.5)",border:"1px solid #3d352a",borderRadius:4,padding:"8px 10px"}}>
                    <span style={{fontSize:10,fontWeight:700,fontFamily:"'Cinzel',serif",color:"#c4a96a",letterSpacing:1,width:55,flexShrink:0,textTransform:"uppercase"}}>{ledgerForm.type}</span>
                    <input value={ledgerForm.desc} onChange={e=>setLedgerForm({...ledgerForm,desc:e.target.value})}
                      placeholder="Description..."
                      onKeyDown={e=>{if(e.key==="Enter")addLedgerEntry();}}
                      style={{flex:2,background:"rgba(15,13,10,.5)",border:"1px solid #3d352a",borderRadius:3,color:"#d4c9b0",padding:"5px 8px",fontSize:13,fontFamily:"'Crimson Text',serif"}} />
                    <input value={ledgerForm.amount} onChange={e=>setLedgerForm({...ledgerForm,amount:e.target.value})}
                      placeholder="Amount (e.g. 5gc)"
                      onKeyDown={e=>{if(e.key==="Enter")addLedgerEntry();}}
                      style={{flex:1,background:"rgba(15,13,10,.5)",border:"1px solid #3d352a",borderRadius:3,color:"#d4c9b0",padding:"5px 8px",fontSize:13,fontFamily:"'Crimson Text',serif"}} />
                    <button onClick={addLedgerEntry} style={{
                      padding:"5px 12px",borderRadius:4,cursor:"pointer",
                      fontFamily:"'Cinzel',serif",fontSize:11,fontWeight:700,
                      background:"linear-gradient(135deg,#3a4a2a,#2a3a1a)",border:"1px solid #5a7a3a",color:"#c0e890",
                      opacity:ledgerForm.desc?"1":"0.4",
                    }}>Add</button>
                    <button onClick={()=>setLedgerForm(null)} style={{
                      background:"none",border:"none",color:"#5a3a3a",cursor:"pointer",fontSize:14,fontWeight:700,
                    }}>✕</button>
                  </div>
                )}
                <div style={{maxHeight:220,overflowY:"auto",background:"rgba(15,13,10,.4)",border:"1px solid #3d352a",borderRadius:5}}>
                  {(est.ledger||[]).length===0 ? (
                    <p style={{color:"#5a5040",padding:12,textAlign:"center",fontStyle:"italic",fontSize:12}}>No ledger entries yet.</p>
                  ) : (est.ledger||[]).map((entry,i) => (
                    <div key={entry.id||i} style={{display:"flex",gap:10,padding:"6px 12px",borderBottom:"1px solid rgba(61,53,42,.2)",alignItems:"center"}}>
                      <span style={{
                        fontSize:9,fontWeight:700,fontFamily:"'Cinzel',serif",letterSpacing:1,
                        color:entry.type==="Income"?"#8ac060":entry.type==="Expense"?"#d88a5a":entry.type==="Monthly"?"#7aaad0":"#a89878",
                        width:55,textTransform:"uppercase",flexShrink:0,
                      }}>{entry.type}</span>
                      <span style={{flex:1,fontSize:12,color:"#d4c9b0"}}>{entry.desc}</span>
                      <span style={{fontSize:11,color:"#c4a96a",fontWeight:600,flexShrink:0}}>{entry.amount}</span>
                      <span style={{fontSize:9,color:"#5a5040",flexShrink:0}}>{new Date(entry.date).toLocaleDateString()}</span>
                      <RmBtn onClick={()=>{const n=[...(est.ledger||[])];n.splice(i,1);ue("ledger",n);}} />
                    </div>
                  ))}
                </div>

                {/* Estate Notes */}
                <SH t="Estate Notes & Journal" />
                <div style={{display:"flex",gap:6,marginBottom:8}}>
                  <textarea value={noteInput} onChange={e=>setNoteInput(e.target.value)}
                    placeholder="Write a new estate note..."
                    onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();addNote();}}}
                    style={{flex:1,background:"rgba(26,23,20,.8)",border:"1px solid #3d352a",borderRadius:3,color:"#d4c9b0",padding:"8px 10px",fontSize:13,minHeight:40,resize:"vertical",fontFamily:"'Crimson Text',serif"}} />
                  <button onClick={addNote} style={{
                    padding:"8px 14px",borderRadius:4,cursor:"pointer",alignSelf:"flex-start",
                    fontFamily:"'Cinzel',serif",fontSize:11,fontWeight:700,
                    background:"linear-gradient(135deg,#2a3a2a,#1a2a1a)",border:"1px solid #3a5a3a",color:"#a0d8a0",
                    opacity:noteInput.trim()?"1":"0.4",
                  }}>+ Add</button>
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:6}}>
                  {(est.notes||[]).map((note,i) => (
                    <div key={note.id||i} style={{background:"rgba(26,23,20,.5)",border:"1px solid #3d352a",borderRadius:4,padding:"8px 12px"}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                        <span style={{fontSize:10,color:"#5a5040"}}>{new Date(note.date).toLocaleDateString()} {new Date(note.date).toLocaleTimeString()}</span>
                        <RmBtn onClick={()=>{const n=[...(est.notes||[])];n.splice(i,1);ue("notes",n);}} />
                      </div>
                      <textarea value={note.text} onChange={e=>{const n=[...(est.notes||[])];n[i]={...n[i],text:e.target.value};ue("notes",n);}}
                        style={{width:"100%",background:"transparent",border:"none",color:"#d4c9b0",fontSize:13,padding:0,minHeight:30,resize:"vertical",fontFamily:"'Crimson Text',serif"}} />
                    </div>

                    {ch.sessionState.active && ch.sessionState.startTime && (
                      <div style={{fontSize:10,color:"#8a7d6a"}}>
                        Started: {new Date(ch.sessionState.startTime).toLocaleString()}
                      </div>
                    )}
                  </div>
                  
                  {/* Start/End Session Button */}
                  <button onClick={() => {
                    if (!ch.sessionState.active) {
                      // Start session
                      const newCh = {
                        ...ch,
                        sessionState: {
                          ...ch.sessionState,
                          active: true,
                          startTime: Date.now(),
                          woundsAtStart: ch.wCur,
                          fortuneAtStart: ch.fortune,
                          resolveAtStart: ch.resolve,
                          advantageHistory: [ch.advantage],
                          combatStats: {
                            combatsEntered: 0,
                            totalRounds: 0,
                            maxAdvantage: 0,
                          },
                        },
                      };
                      setCh(newCh);
                      save(newCh);
                      addLog("Session started");
                      setSaveMsg("Session started!");
                      setTimeout(() => setSaveMsg(""), 3000);
                    } else {
                      // End session - calculate statistics
                      const duration = Date.now() - ch.sessionState.startTime;
                      const woundsLost = ch.sessionState.woundsAtStart - ch.wCur;
                      const fortuneSpent = ch.sessionState.fortuneAtStart - ch.fortune;
                      const resolveSpent = ch.sessionState.resolveAtStart - ch.resolve;
                      const conditionsSuffered = ch.conditions.length;
                      const combatStats = ch.sessionState.combatStats || {combatsEntered: 0, totalRounds: 0, maxAdvantage: 0};
                      
                      const sessionSummary = {
                        timestamp: Date.now(),
                        duration: duration,
                        woundsLost: woundsLost,
                        fortuneSpent: fortuneSpent,
                        resolveSpent: resolveSpent,
                        conditionsSuffered: conditionsSuffered,
                        combatsEntered: combatStats.combatsEntered,
                        roundsInCombat: combatStats.totalRounds,
                        maxAdvantage: combatStats.maxAdvantage,
                      };
                      
                      // INTEGRATION 2: Log session summary
                      let newCh = logSessionSummary(ch, sessionSummary);
                      
                      // INTEGRATION 7: Add to session history
                      newCh = addSessionToHistory(newCh, sessionSummary);
                      
                      // Offer to restore Fortune/Resolve
                      if (confirm(`End session?\n\nSession Statistics:\n- Duration: ${Math.round(duration / 60000)} minutes\n- Wounds Lost: ${woundsLost}\n- Fortune Spent: ${fortuneSpent}\n- Resolve Spent: ${resolveSpent}\n- Combats: ${combatStats.combatsEntered}\n- Rounds in Combat: ${combatStats.totalRounds}\n\nRestore Fortune and Resolve to starting values?`)) {
                        newCh = {
                          ...newCh,
                          fortune: ch.sessionState.fortuneAtStart,
                          resolve: ch.sessionState.resolveAtStart,
                        };
                      }
                      
                      // Clear session state
                      newCh = {
                        ...newCh,
                        sessionState: {
                          active: false,
                          startTime: null,
                          woundsAtStart: 0,
                          fortuneAtStart: 0,
                          resolveAtStart: 0,
                          advantageHistory: [],
                          temporaryModifiers: [],
                          combatStats: {
                            combatsEntered: 0,
                            totalRounds: 0,
                            maxAdvantage: 0,
                          },
                        },
                      };
                      
                      setCh(newCh);
                      save(newCh);
                      addLog("Session ended");
                      setSaveMsg("Session ended and logged!");
                      setTimeout(() => setSaveMsg(""), 3000);
                    }

                    fontFamily:"'Cinzel',serif",fontSize:12,fontWeight:700,
                    padding:"10px 16px",borderRadius:5,cursor:"pointer",

/* ══════════ SHARED COMPONENTS ══════════ */

function Tooltip({text, visible}) {
  if (!visible) return null;
  
  return (
    <div style={{
      position: "absolute",
      bottom: "100%",
      left: "50%",
      transform: "translateX(-50%)",
      marginBottom: "8px",
      padding: "6px 10px",
      background: "rgba(26, 23, 20, 0.95)",
      border: "1px solid #4a3f2f",
      borderRadius: "4px",
      color: "#d4c9b0",
      fontSize: "11px",
      fontFamily: "'Cinzel', serif",
      whiteSpace: "nowrap",
      zIndex: 1000,
      pointerEvents: "none",
      boxShadow: "0 2px 8px rgba(0, 0, 0, 0.3)"
    }}>
      {text}
    </div>
  );
}

function CharacteristicCell({abbr, children, style}) {
  const [showTooltip, setShowTooltip] = React.useState(false);
  
  const handleMouseEnter = () => {
    try {
      setShowTooltip(true);
    } catch (error) {
      console.error('Error showing tooltip:', error);
    }
  };
  
  const handleMouseLeave = () => {
    try {
      setShowTooltip(false);
    } catch (error) {
      console.error('Error hiding tooltip:', error);
    }
  };
  
  const handleFocus = () => {
    try {
      setShowTooltip(true);
    } catch (error) {
      console.error('Error showing tooltip on focus:', error);
    }
  };
  
  const handleBlur = () => {
    try {
      setShowTooltip(false);
    } catch (error) {
      console.error('Error hiding tooltip on blur:', error);
    }
  };
  
  const fullName = CHARACTERISTIC_NAMES[abbr];
  
  if (!fullName) {
    console.warn(`Missing mapping for characteristic abbreviation: ${abbr}`);
  }
  
  const tooltipText = fullName || abbr;
  
  return (
    <div
      style={{
        position: "relative",
        display: "inline-block",
        ...style
      }}
      onMouseEnter={handleMouseEnter}
      onMouseLeave={handleMouseLeave}
      onFocus={handleFocus}
      onBlur={handleBlur}
      tabIndex={0}
      aria-label={tooltipText}
      title={tooltipText}
    >
      {children}
      <Tooltip text={tooltipText} visible={showTooltip} />
    </div>
  );
}

/* ══════════ PROPERTY-BASED TESTS FOR DAMAGE CALCULATION ══════════ */

/**
 * Property-Based Tests for calculateDamage() function
 * 
 * Tests validate:
 * - Property 2: Melee Damage Calculation
 * - Property 3: Ranged Damage Calculation (unified for all ranged types)
 * - Property 49: Damage Calculation Performance
 * 
 * Validates Requirements: 1.1-1.3, 18.1
 */

// Test configuration
const RUN_TESTS_ON_LOAD = true; // Set to false to disable automatic test execution
const NUM_TEST_RUNS = 100; // Number of random test cases per property

// Sample weapons for testing
const TEST_WEAPONS = {
  melee: [
    {name:"Hand Weapon",group:"Basic",damage:"+SB+4",qualities:"—"},
    {name:"Dagger",group:"Basic",damage:"+SB+2",qualities:"—"},
    {name:"Great Weapon",group:"Two-Handed",damage:"+SB+7",qualities:"—"},
  ],
  ranged: [
    {name:"Bow",group:"Bow",damage:"1/2SB+3",qualities:"Impale"},
    {name:"Crossbow",group:"Crossbow",damage:"+9",qualities:"Impale"},
    {name:"Pistol",group:"Blackpowder",damage:"+8",qualities:"Pistol, BP, Impale, Penetrating"},
    {name:"Javelin",group:"Throwing",damage:"1/2SB+3",qualities:"Impale"},
    {name:"Sling",group:"Sling",damage:"1/2SB+3",qualities:"—"},
    {name:"Whip",group:"Entangling",damage:"+SB+2",qualities:"—"},
  ],
  impale: [
    {name:"Rapier",group:"Fencing",damage:"+SB+4",qualities:"Fast, Impale"},
    {name:"Spear",group:"Polearm",damage:"+SB+4",qualities:"Impale"},
    {name:"Bow",group:"Bow",damage:"1/2SB+3",qualities:"Impale"},
    {name:"Longbow",group:"Bow",damage:"1/2SB+4",qualities:"Damaging, Impale"},
  ],
  nonImpale: [
    {name:"Hand Weapon",group:"Basic",damage:"+SB+4",qualities:"—"},
    {name:"Dagger",group:"Basic",damage:"+SB+2",qualities:"—"},
    {name:"Sling",group:"Sling",damage:"1/2SB+3",qualities:"—"},
  ]
};

/**
 * Property 2: Melee Damage Calculation
 * 
 * For all melee weapon attacks, the final damage must equal the maximum of 0 
 * and (weapon damage + Strength Bonus - target Armor Points - target Toughness Bonus).
 * 
 * **Validates: Requirements 1.1, 1.3**
 */
function testProperty2_MeleeDamageCalculation() {
  const fc = window.fastCheck;
  
  const property = fc.property(
    fc.constantFrom(...TEST_WEAPONS.melee), // Random melee weapon
    fc.integer({min: 1, max: 100}),         // Attack roll (1-100)
    fc.integer({min: 0, max: 5}),           // Target AP (0-5)
    fc.integer({min: 0, max: 10}),          // Target TB (0-10)
    fc.integer({min: 0, max: 10}),          // Character SB (0-10)
    (weapon, attackRoll, targetAP, targetTB, characterSB) => {
      const result = calculateDamage(weapon, attackRoll, targetAP, targetTB, characterSB, 0);
      
      // Parse weapon bonus from damage string
      let weaponBonus = 0;
      const damageStr = weapon.damage || "";
      if (damageStr.includes("+SB+")) {
        const parts = damageStr.split("+SB+");
        if (parts.length > 1) {
          weaponBonus = parseInt(parts[1]) || 0;
        }
      }
      
      // Expected damage: weapon damage + SB - (AP + TB), minimum 0
      const expectedBaseDamage = characterSB + weaponBonus;
      const expectedReduction = targetAP + targetTB;
      const expectedFinalDamage = Math.max(0, expectedBaseDamage - expectedReduction);
      
      // Verify the calculation
      return result.finalDamage === expectedFinalDamage &&
             result.baseDamage === expectedBaseDamage &&
             result.reduction === expectedReduction &&
             result.finalDamage >= 0 &&
             result.isRanged === false;
    }
  );
  
  return fc.check(property, {numRuns: NUM_TEST_RUNS});
}

/**
 * Property 3: Ranged Damage Calculation (unified for all ranged types)
 * 
 * For all ranged weapon attacks (bow, crossbow, blackpowder, throwing, sling, entangling), 
 * the final damage must equal the maximum of 0 and 
 * (floor(Strength Bonus / 2) + weapon bonus - target Armor Points - target Toughness Bonus).
 * 
 * **Validates: Requirements 1.2, 1.3**
 */
function testProperty3_RangedDamageCalculation() {
  const fc = window.fastCheck;
  
  const property = fc.property(
    fc.constantFrom(...TEST_WEAPONS.ranged), // Random ranged weapon
    fc.integer({min: 1, max: 100}),          // Attack roll (1-100)
    fc.integer({min: 0, max: 5}),            // Target AP (0-5)
    fc.integer({min: 0, max: 10}),           // Target TB (0-10)
    fc.integer({min: 0, max: 10}),           // Character SB (0-10)
    (weapon, attackRoll, targetAP, targetTB, characterSB) => {
      const result = calculateDamage(weapon, attackRoll, targetAP, targetTB, characterSB, 0);
      
      // Parse weapon bonus from damage string
      let weaponBonus = 0;
      const damageStr = weapon.damage || "";
      
      if (damageStr.includes("1/2SB")) {
        const parts = damageStr.split("1/2SB");
        if (parts.length > 1 && parts[1].includes("+")) {
          weaponBonus = parseInt(parts[1].substring(1)) || 0;
        }
      } else if (damageStr.includes("+SB+")) {
        const parts = damageStr.split("+SB+");
        if (parts.length > 1) {
          weaponBonus = parseInt(parts[1]) || 0;
        }
      } else if (damageStr.startsWith("+")) {
        weaponBonus = parseInt(damageStr.substring(1)) || 0;
      }
      
      // Expected damage: floor(SB/2) + weapon bonus - (AP + TB), minimum 0
      const expectedBaseDamage = Math.floor(characterSB / 2) + weaponBonus;
      const expectedReduction = targetAP + targetTB;
      const expectedFinalDamage = Math.max(0, expectedBaseDamage - expectedReduction);
      
      // Verify the calculation
      return result.finalDamage === expectedFinalDamage &&
             result.baseDamage === expectedBaseDamage &&
             result.reduction === expectedReduction &&
             result.finalDamage >= 0 &&
             result.isRanged === true;
    }
  );
  
  return fc.check(property, {numRuns: NUM_TEST_RUNS});
}

/**
 * Property 4: Critical Hit Detection - Doubles
 * 
 * For all attack rolls, a critical hit occurs if the tens digit equals the units digit
 * and the roll value is less than or equal to the test value.
 * 
 * **Validates: Requirements 1.4, 1.6**
 */
function testProperty4_CriticalHitDetectionDoubles() {
  const fc = window.fastCheck;
  
  const allWeapons = [...TEST_WEAPONS.melee, ...TEST_WEAPONS.ranged];
  
  const property = fc.property(
    fc.constantFrom(...allWeapons),         // Random weapon
    fc.integer({min: 11, max: 99}),         // Attack roll (11-99 to test doubles)
    fc.integer({min: 0, max: 5}),           // Target AP (0-5)
    fc.integer({min: 0, max: 10}),          // Target TB (0-10)
    fc.integer({min: 0, max: 10}),          // Character SB (0-10)
    fc.integer({min: 1, max: 100}),         // Test value (1-100)
    (weapon, attackRoll, targetAP, targetTB, characterSB, testValue) => {
      const result = calculateDamage(weapon, attackRoll, targetAP, targetTB, characterSB, 0, testValue);
      
      // Check if roll is doubles
      const tensDigit = Math.floor(attackRoll / 10);
      const unitsDigit = attackRoll % 10;
      const isDoubles = tensDigit === unitsDigit;
      
      // Attack succeeded?
      const succeeded = attackRoll <= testValue;
      
      // If attack succeeded and roll is doubles, should be critical
      if (succeeded && isDoubles) {
        return result.isCritical === true && result.criticalBonus === result.successLevel;
      }
      
      // If attack failed or not doubles, might still be critical for Impale weapons on multiples of 10
      return true; // This property only tests doubles, not Impale multiples
    }
  );
  
  return fc.check(property, {numRuns: NUM_TEST_RUNS});
}

/**
 * Property 5: Critical Hit Detection - Impale Multiples
 * 
 * For all attack rolls with Impale weapons, a critical hit occurs if the roll is a multiple of 10
 * (10, 20, 30, etc.) and the roll value is less than or equal to the test value.
 * 
 * **Validates: Requirements 1.5, 1.6**
 */
function testProperty5_CriticalHitDetectionImpaleMultiples() {
  const fc = window.fastCheck;
  
  const property = fc.property(
    fc.constantFrom(...TEST_WEAPONS.impale), // Random Impale weapon
    fc.integer({min: 1, max: 10}).map(x => x * 10), // Multiples of 10: 10, 20, 30, ..., 100
    fc.integer({min: 0, max: 5}),           // Target AP (0-5)
    fc.integer({min: 0, max: 10}),          // Target TB (0-10)
    fc.integer({min: 0, max: 10}),          // Character SB (0-10)
    fc.integer({min: 1, max: 100}),         // Test value (1-100)
    (weapon, attackRoll, targetAP, targetTB, characterSB, testValue) => {
      const result = calculateDamage(weapon, attackRoll, targetAP, targetTB, characterSB, 0, testValue);
      
      // Attack succeeded?
      const succeeded = attackRoll <= testValue;
      
      // If attack succeeded with Impale weapon on multiple of 10, should be critical
      if (succeeded && attackRoll > 0) {
        return result.isCritical === true && result.criticalBonus === result.successLevel;
      }
      
      return true;
    }
  );
  
  return fc.check(property, {numRuns: NUM_TEST_RUNS});
}

/**
 * Property 49: Damage Calculation Performance
 * 
 * For any damage calculation, the computation must complete in less than 10 milliseconds.
 * 
 * **Validates: Requirement 18.1**
 */
function testProperty49_DamageCalculationPerformance() {
  const fc = window.fastCheck;
  
  const allWeapons = [...TEST_WEAPONS.melee, ...TEST_WEAPONS.ranged];
  
  const property = fc.property(
    fc.constantFrom(...allWeapons),         // Random weapon
    fc.integer({min: 1, max: 100}),         // Attack roll (1-100)
    fc.integer({min: 0, max: 5}),           // Target AP (0-5)
    fc.integer({min: 0, max: 10}),          // Target TB (0-10)
    fc.integer({min: 0, max: 10}),          // Character SB (0-10)
    (weapon, attackRoll, targetAP, targetTB, characterSB) => {
      const startTime = performance.now();
      calculateDamage(weapon, attackRoll, targetAP, targetTB, characterSB, 0);
      const endTime = performance.now();
      
      const executionTime = endTime - startTime;
      
      // Must complete in less than 10ms
      return executionTime < 10;
    }
  );
  
  return fc.check(property, {numRuns: NUM_TEST_RUNS});
}
