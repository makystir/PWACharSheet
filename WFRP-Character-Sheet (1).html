/*
 * Character Interface (v6)
 * 
 * New fields added in v6 for combat, conditions, advancement tracking, and session management:
 * 
 * interface Condition {
 *   name: string;           // One of: Ablaze, Bleeding, Blinded, Broken, Deafened, Entangled, 
 *                           //         Fatigued, Poisoned, Prone, Stunned, Surprised, Unconscious
 *   level: number;          // Condition level (for stackable conditions)
 *   duration?: string;      // Optional duration (e.g., "end of round", "1 hour")
 *   source?: string;        // Optional source (e.g., "Critical Hit", "Spell")
 * }
 * 
 * interface SessionState {
 *   active: boolean;                // Whether a session is currently active
 *   startTime: number | null;       // Session start timestamp (Date.now())
 *   woundsAtStart: number;          // Wounds value when session started
 *   fortuneAtStart: number;         // Fortune value when session started
 *   resolveAtStart: number;         // Resolve value when session started
 *   advantageHistory: number[];     // History of Advantage values during session
 *   temporaryModifiers: Modifier[]; // Temporary modifiers active during session
 * }
 * 
 * interface CombatState {
 *   inCombat: boolean;      // Whether character is currently in combat
 *   initiative: number;     // Initiative value for combat order
 *   currentRound: number;   // Current combat round number
 *   engaged: boolean;       // Whether character is engaged in melee
 *   surprised: boolean;     // Whether character is surprised
 * }
 * 
 * interface AdvancementEntry {
 *   timestamp: number;      // When advancement was made (Date.now())
 *   type: string;           // 'characteristic', 'skill', or 'talent'
 *   name: string;           // Name of what was advanced
 *   from: number;           // Previous value (for characteristics/skills)
 *   to: number;             // New value (for characteristics/skills)
 *   xpCost: number;         // XP cost of advancement
 *   careerLevel: string;    // Career level at time of advancement
 *   inCareer: boolean;      // Whether advancement was in-career
 * }
 * 
 * interface QuickAction {
 *   id: string;             // Unique identifier
 *   name: string;           // Display name
 *   type: string;           // 'attack', 'spell', 'skill', 'prayer'
 *   data: any;              // Action-specific data (weapon, spell, etc.)
 *   hotkey?: string;        // Optional keyboard shortcut
 * }
 * 
 * interface CriticalWound {
 *   id: number;             // Unique identifier (timestamp)
 *   timestamp: number;      // When wound was received (Date.now())
 *   location: string;       // Hit location: head, body, arm, leg
 *   description: string;    // Description of the wound
 *   effects: string;        // Mechanical effects of the wound
 *   duration: string;       // Duration type: permanent, temporary, or specific
 *   severity: number;       // Severity value from critical table
 *   healed: boolean;        // Whether the wound has been healed
 *   healedAt?: number;      // When wound was healed (Date.now())
 * }
 * 
 * interface Modifier {
 *   target: string;         // What is modified (e.g., "WS", "Movement", "Damage")
 *   value: number;          // Modifier value
 *   source: string;         // Source of modifier
 * }
 */

  "Nimble Fingered":    { char: "Dex", bonus: 5 },
  "Savvy":              { char: "Int", bonus: 5 },
  "Coolheaded":         { char: "WP",  bonus: 5 },
  "Suave":              { char: "Fel", bonus: 5 },
};

function computeTalentBonuses(talents) {
  const bonuses = { WS:0, BS:0, S:0, T:0, I:0, Ag:0, Dex:0, Int:0, WP:0, Fel:0 };
  for (const tal of (talents || [])) {
    const mapping = TALENT_BONUS_MAP[tal.n];
    if (mapping) {
      bonuses[mapping.char] += mapping.bonus * (tal.t || 1);
    }
  }
  return bonuses;
}

function syncTalentBonuses(ch) {
  const computed = computeTalentBonuses(ch.talents || []);
  const overrides = ch.charBonusOverrides || {};
  const newChars = { ...ch.chars };
  for (const abbr of Object.keys(computed)) {
    if (!overrides[abbr]) {
      newChars[abbr] = { ...newChars[abbr], b: computed[abbr] };
    }
  }
  return { ...ch, chars: newChars };
}

/* ══════════ ARMOUR POINTS CALCULATION HELPERS ══════════ */

const LOCATION_MAP = {
  'arms': ['lArm', 'rArm'],
  'legs': ['lLeg', 'rLeg'],
  'body': ['body'],
  'head': ['head'],
  'all': ['head', 'lArm', 'rArm', 'body', 'lLeg', 'rLeg']
};

const ALL_HIT_LOCATIONS = ['head', 'lArm', 'rArm', 'body', 'lLeg', 'rLeg'];

/**
 * Parse a location string into an array of hit location keys.
 * @param {string} locationString - e.g., "Arms, Body" or "All"
 * @returns {string[]} - e.g., ["lArm", "rArm", "body"]
 */
function parseLocations(locationString) {
  if (!locationString || typeof locationString !== 'string') return [];
  const tokens = locationString.split(',').map(t => t.trim().toLowerCase()).filter(Boolean);
  const result = [];
  for (const token of tokens) {
    const mapped = LOCATION_MAP[token];
    if (mapped) {
      for (const loc of mapped) {
        if (result.indexOf(loc) === -1) result.push(loc);
      }
    }
  }
  return result;
}

/**
 * Check if an armour item has the Flexible quality.
 * @param {{qualities: string}} armourItem
 * @returns {boolean}
 */
function isFlexible(armourItem) {
  if (!armourItem || !armourItem.qualities || typeof armourItem.qualities !== 'string') return false;
  return armourItem.qualities.toLowerCase().indexOf('flexible') !== -1;
}

/**
 * Calculate effective Armour Points per hit location from equipped armour.
 * Implements WFRP 4e stacking rules: best Flexible + best non-Flexible per location.
 *
 * @param {Array<{name: string, locations: string, ap: number|string, qualities: string}>} armourList
 * @returns {{head: number, lArm: number, rArm: number, body: number, lLeg: number, rLeg: number}}
 */
function calculateArmourPoints(armourList) {
  const flexMax = {};
  const nonFlexMax = {};
  for (const loc of ALL_HIT_LOCATIONS) {
    flexMax[loc] = 0;
    nonFlexMax[loc] = 0;
  }

  if (!Array.isArray(armourList)) {
    const result = {};
    for (const loc of ALL_HIT_LOCATIONS) result[loc] = 0;
    return result;
  }

  for (const item of armourList) {
    const ap = Math.max(0, parseInt(item.ap, 10) || 0);
    const locs = parseLocations(item.locations);
    const flex = isFlexible(item);

    for (const loc of locs) {
      if (flex) {
        if (ap > flexMax[loc]) flexMax[loc] = ap;
      } else {
        if (ap > nonFlexMax[loc]) nonFlexMax[loc] = ap;
      }
    }
  }

  const result = {};
  for (const loc of ALL_HIT_LOCATIONS) {
    result[loc] = flexMax[loc] + nonFlexMax[loc];
  }
  return result;
}

/**
 * Compute the bonus (tens digit) of a characteristic total.
 * @param {Object} character - The character object
 * @param {string} charKey - Characteristic abbreviation, e.g. "S", "T", "WP"
 * @returns {number} - The bonus value (Math.floor of total / 10)
 */
function getBonus(character, charKey) {
  const c = character.chars && character.chars[charKey];
  const total = (c?.i || 0) + (c?.a || 0) + (c?.b || 0);
  return Math.floor(total / 10);
}

/**
 * Find the level of the Hardy talent in a talents array.
 * Talents are stored as {n: name, t: level, d: description}.
 * @param {Array<{n: string, t: number, d: string}>} talents
 * @returns {number} - Hardy level (0 if not found)
 */
function getHardyLevel(talents) {
  if (!Array.isArray(talents)) return 0;
  const hardy = talents.find(t => t && t.n && t.n.toLowerCase() === 'hardy');
  return hardy ? (parseInt(hardy.t, 10) || 0) : 0;
}

/**
 * Find the level of the Strong Back talent in a talents array.
 * Talents are stored as {n: name, t: level, d: description}.
 * @param {Array<{n: string, t: number, d: string}>} talents
 * @returns {number} - Strong Back level (0 if not found)
 */
function getStrongBackLevel(talents) {
  if (!Array.isArray(talents)) return 0;
  const sb = talents.find(t => t && t.n === "Strong Back");
  return sb ? (sb.t || 0) : 0;
}

/**
 * Calculate Maximum Encumbrance from character stats and talents.
 * Formula: SB + TB + Strong Back level (WFRP 4e Core Rulebook p.293)
 * @param {Object} character - The character object
 * @returns {number} - Maximum encumbrance value
 */
function calculateMaxEncumbrance(character) {
  return getBonus(character, 'S') + getBonus(character, 'T') + getStrongBackLevel(character.talents);
}

/**
 * Calculate coin weight encumbrance.
 * Every 200 coins count as 1 Encumbrance point (WFRP 4e Core Rulebook p.293).
 * @param {Object} character - The character object
 * @returns {number} - Coin weight in encumbrance points
 */
function calculateCoinWeight(character) {
  return Math.floor(((character.wD || 0) + (character.wSS || 0) + (character.wGC || 0)) / 200);
}

/**
 * Calculate Total Wounds breakdown from character data.
 * Formula: (woundsUseSB ? SB : 0) + 2×TB + WPB + (Hardy_Level × TB)
 *
 * @param {Object} character - The character object with chars, talents, woundsUseSB
 * @returns {{sb: number, tb: number, tb2: number, wpb: number, hardyLevel: number, hardy: number, total: number}}
 */
function calculateTotalWounds(character) {
  const sb = getBonus(character, 'S');
  const tb = getBonus(character, 'T');
  const wpb = getBonus(character, 'WP');
  const hardyLevel = getHardyLevel(character.talents);

  const useSB = character.woundsUseSB !== false;
  const sbComponent = useSB ? sb : 0;
  const tb2 = 2 * tb;
  const hardyComponent = hardyLevel * tb;
  const total = sbComponent + tb2 + wpb + hardyComponent;

  return { sb: sbComponent, tb, tb2, wpb, hardyLevel, hardy: hardyComponent, total };
}

}

/**

 */
function getCareerLevelOptions(careerName) {
  const career = CAREER_SCHEMES[careerName];
  if (!career) return [];
  return [1, 2, 3, 4].map(n => ({
    value: `level${n}`,
    label: `${n} — ${career[`level${n}`].title}`
  }));
}

/**
 * Get status string for a career at a specific level
 * @param {string} careerName - The career name
 * @param {string} level - The level key (e.g., "level1")
 * @returns {string} Status string (e.g., "Silver 4") or empty string
 */
function getStatusForCareerLevel(careerName, level) {
  const career = CAREER_SCHEMES[careerName];
  if (!career || !career[level]) return "";
  return career[level].status || "";
}

/**
 * Apply career skills to character's advanced skills list.
 * Skills already in bSkills or aSkills are skipped (no duplicates).
 * Existing aSkills entries are never removed or modified.
 * New skills get their characteristic from ADV_SKILL_DB, or "" if not found.
 * @param {Object} character - The character object with bSkills and aSkills arrays
 * @param {string} careerName - The career name in CAREER_SCHEMES
 * @param {string} level - The level key (e.g., "level1")
 * @returns {Object} Updated character with new skills added to aSkills
 */
function applyCareerSkills(character, careerName, level) {
  const career = CAREER_SCHEMES[careerName];
  if (!career || !career[level]) return character;

  const careerSkills = career[level].skills || [];
  const basicSkillNames = character.bSkills.map(s => s.n);
  const advancedSkillNames = character.aSkills.map(s => s.n);

  const newSkills = [];
  for (const skillName of careerSkills) {
    // Skip if already in basic or advanced skills
    if (basicSkillNames.includes(skillName)) continue;
    if (advancedSkillNames.includes(skillName)) continue;

    // Look up characteristic from ADV_SKILL_DB, fallback to empty string
    const skillData = ADV_SKILL_DB.find(s => s.n === skillName);
    const characteristic = skillData ? skillData.c : "";

    newSkills.push({ n: skillName, c: characteristic, a: 0 });
  }

  if (newSkills.length === 0) return character;

  return {
    ...character,
    aSkills: [...character.aSkills, ...newSkills]
  };
}

/**
 * Update career path when career changes
 * @param {Object} character - The character object
 * @param {string} newCareer - The new career name
 * @returns {Object} Updated character with career path
 */
function updateCareerPath(character, newCareer) {
  const currentPath = character.careerPath || "";

  // If empty, set to new career
  if (!currentPath) {
    return { ...character, careerPath: newCareer };
  }

  // Check if last career in path is same as new career
  const pathParts = currentPath.split(" → ");
  const lastCareer = pathParts[pathParts.length - 1];

  if (lastCareer === newCareer) {
    return character; // No change needed
  }

  return {
    ...character,
    careerPath: `${currentPath} → ${newCareer}`
  };
}

// Build reverse lookup map from career level titles to {career, level} pairs
const CAREER_LEVEL_TITLES = {};
for (const [careerName, careerData] of Object.entries(CAREER_SCHEMES)) {
  for (let i = 1; i <= 4; i++) {
    const level = careerData[`level${i}`];
    if (level && level.title) {
      CAREER_LEVEL_TITLES[level.title] = { career: careerName, level: i };
    }
  }
}

/**
 * Resolve a career name input to a base career name and optional level number.
 * Checks base career names first (pass-through), then career level titles (reverse lookup).
 * @param {string} input - Career name or level title
 * @returns {{careerName: string, levelNumber: number|null}|null} Resolved career info or null
 */
function resolveCareerName(input) {
  if (CAREER_SCHEMES[input]) return { careerName: input, levelNumber: null };
  if (CAREER_LEVEL_TITLES[input]) {
    const entry = CAREER_LEVEL_TITLES[input];
    return { careerName: entry.career, levelNumber: entry.level };
  }
  return null;
}

/**
 * Helper function to get career scheme for a specific career and level
 * @param {string} careerName - Name of the career
 * @param {string|number} level - Career level (1-4 or "level1"-"level4" or "3 — Tracker" format)
 * @returns {Object|null} Career scheme object or null if not found
 */
function getCareerScheme(careerName, level) {
  // Resolve career level titles (e.g., "Guide" → "Scout") before lookup
  const resolved = resolveCareerName(careerName);
  if (!resolved) {
    return null;
  }
  const resolvedCareerName = resolved.careerName;

  // If resolveCareerName provided a level number and no explicit level was passed, use it
  if (resolved.levelNumber != null && level == null) {
    level = resolved.levelNumber;
  }
  
  // Normalize level to "level1", "level2", etc.
  let levelKey;
  if (typeof level === 'number') {
    levelKey = `level${level}`;
  } else if (typeof level === 'string') {
    // Handle formats like "3 — Tracker" or "level3"
    const match = level.match(/^(\d+)/);
    if (match) {
      levelKey = `level${match[1]}`;
    } else {
      levelKey = level;
    }
  }
  
  return CAREER_SCHEMES[resolvedCareerName][levelKey] || null;
}

function getSpeciesData(speciesKey) {
  return SPECIES_DATA[speciesKey] || null;
}

function applySpeciesData(character, speciesKey) {
  const data = getSpeciesData(speciesKey);
  if (!data) return character;
  const next = JSON.parse(JSON.stringify(character));
  next.species = speciesKey;
  const CA = ["WS","BS","S","T","I","Ag","Dex","Int","WP","Fel"];
  CA.forEach(k => { next.chars[k].i = data.chars[k] || 0; });
  next.move = { m: data.move, w: data.move * 2, r: data.move * 4 };
  next.fate = data.fate;
  next.fortune = data.fate;
  next.resilience = data.resilience;
  next.resolve = data.resilience;
  next.speciesExtraPoints = data.extraPoints;
  next.woundsUseSB = data.woundsUseSB;
  next.speciesSkills = [...data.skills];
  next.speciesTalents = [...data.talents];
  return next;
}

function clearSpeciesData(character) {
  const next = JSON.parse(JSON.stringify(character));
  next.species = "";
  const CA = ["WS","BS","S","T","I","Ag","Dex","Int","WP","Fel"];
  CA.forEach(k => { next.chars[k].i = 0; });
  next.move = { m: 0, w: 0, r: 0 };
  next.fate = 0;
  next.fortune = 0;
  next.resilience = 0;
  next.resolve = 0;
  next.speciesExtraPoints = 0;
  next.speciesSkills = [];
  next.speciesTalents = [];
  next.woundsUseSB = true;
  return next;
}

/* ══════════ DAMAGE CALCULATION FUNCTIONS ══════════ */

/**
 * Calculate damage for a weapon attack per WFRP 4e rules with custom house rules.
 * 
 * @param {Object} weapon - Weapon object from WEAPONS database
 * @param {number} attackRoll - Attack roll result (1-100)
 * @param {number} targetAP - Target's Armor Points
 * @param {number} targetTB - Target's Toughness Bonus
 * @param {number} characterSB - Character's Strength Bonus
 * @param {number} characterBS - Character's Ballistic Skill (not used in current implementation)
 * @param {number} testValue - The target value for the attack test (for Success Level calculation)
 * @param {boolean} engaged - Whether character is engaged in melee combat (default: false)
 * @returns {Object} DamageCalculation object with finalDamage and other details
 * 
 * Custom House Rules:
 * - All ranged weapons (bow, crossbow, blackpowder, throwing) use: floor(SB/2) + weapon bonus - (AP + TB)
 * - Melee weapons use: weapon damage + SB - (AP + TB)
 * - Minimum damage is always 0
 * - Critical hits occur on doubles (11, 22, 33, etc.) for all weapons
 * - Impale weapons also crit on multiples of 10 (10, 20, 30, etc.)
 * - Critical hits add Success Level as bonus damage
 * - Ranged weapons at melee distance (engaged): -20 to hit for non-pistol weapons, requires Cool test
 */
function calculateDamage(weapon, attackRoll, targetAP, targetTB, characterSB, characterBS, testValue, engaged = false) {
  // Input validation (Requirement 19.4, 19.6)
  try {
    // Validate weapon object (Requirement 19.5)
    if (!weapon || typeof weapon !== 'object') {
      console.error("calculateDamage: Invalid weapon object", weapon);
      return {
        error: true,
        errorMessage: "Invalid weapon: Weapon object is missing or invalid",
        weapon: null,
        targetAP: targetAP || 0,
        targetTB: targetTB || 0,
        attackRoll: attackRoll || 0,
        testValue: testValue || 0,
        baseDamage: 0,
        reduction: 0,
        isCritical: false,
        successLevel: 0,
        criticalBonus: 0,
        finalDamage: 0,
        isRanged: false,
        rangedAtMeleeDistance: false,
        meleeDistancePenalty: 0,
        isPistol: false,
        requiresCoolTest: false,
      };
    }
    
    // Validate numeric inputs (Requirement 19.6, 19.7)
    if (typeof attackRoll !== 'number' || attackRoll < 1 || attackRoll > 100) {
      console.error("calculateDamage: Invalid attack roll", attackRoll);
      return {
        error: true,
        errorMessage: "Invalid attack roll: Must be a number between 1 and 100",
        weapon: weapon,
        targetAP: targetAP || 0,
        targetTB: targetTB || 0,
        attackRoll: attackRoll || 0,
        testValue: testValue || 0,
        baseDamage: 0,
        reduction: 0,
        isCritical: false,
        successLevel: 0,
        criticalBonus: 0,
        finalDamage: 0,
        isRanged: false,
        rangedAtMeleeDistance: false,
        meleeDistancePenalty: 0,
        isPistol: false,
        requiresCoolTest: false,
      };
    }
    
    // Sanitize numeric inputs (Requirement 19.6)
    const safeTargetAP = Math.max(0, parseInt(targetAP) || 0);
    const safeTargetTB = Math.max(0, parseInt(targetTB) || 0);
    const safeCharacterSB = Math.max(0, parseInt(characterSB) || 0);
    const safeCharacterBS = Math.max(0, parseInt(characterBS) || 0);
    const safeTestValue = testValue !== undefined ? Math.max(0, parseInt(testValue) || 0) : undefined;
    
    // Determine weapon type based on group
    const rangedGroups = ["Bow", "Crossbow", "Blackpowder", "Throwing", "Sling", "Entangling"];
    const isRanged = rangedGroups.includes(weapon.group);
    
    // Check if weapon is pistol-sized (doesn't suffer penalty at melee distance)
    // Pistols are identified by having "Pistol" in the name or being in Blackpowder group with short range
    const isPistol = weapon.name && (
      weapon.name.toLowerCase().includes("pistol") ||
      (weapon.group === "Blackpowder" && weapon.rangeReach && parseInt(weapon.rangeReach) <= 8)
    );
    
    // Ranged weapons at melee distance (Requirement 1.9)
    // Non-pistol ranged weapons suffer -20 to hit when engaged in melee
    const rangedAtMeleeDistance = isRanged && engaged && !isPistol;
    const meleeDistancePenalty = rangedAtMeleeDistance ? -20 : 0;
    
    let baseDamage = 0;
    
    if (isRanged) {
      // Ranged damage: floor(SB/2) + weapon bonus - (AP + TB)
      // Parse weapon damage string to extract bonus
      const damageStr = weapon.damage || "";
      
      // Handle different damage formats:
      // "1/2SB+3" -> bonus = 3
      // "+7" -> bonus = 7 (crossbow/blackpowder flat damage)
      // "1/2SB" -> bonus = 0
      // "+SB+2" -> bonus = 2 (for entangling weapons like whip)
      let weaponBonus = 0;
      
      try {
        if (damageStr.includes("1/2SB")) {
          // Format: "1/2SB+X" or "1/2SB"
          const parts = damageStr.split("1/2SB");
          if (parts.length > 1 && parts[1].includes("+")) {
            weaponBonus = parseInt(parts[1].substring(1)) || 0;
          }
        } else if (damageStr.includes("+SB+")) {
          // Format: "+SB+X" (entangling weapons like whip)
          const parts = damageStr.split("+SB+");
          if (parts.length > 1) {
            weaponBonus = parseInt(parts[1]) || 0;
          }
        } else if (damageStr.startsWith("+")) {
          // Format: "+X" (crossbow/blackpowder flat damage)
          weaponBonus = parseInt(damageStr.substring(1)) || 0;
        }
      } catch (parseError) {
        console.error("calculateDamage: Error parsing weapon damage string", damageStr, parseError);
        weaponBonus = 0; // Default to 0 on parse error
      }
      
      // Custom house rule: all ranged weapons use floor(SB/2) + bonus
      baseDamage = Math.floor(safeCharacterSB / 2) + weaponBonus;
    } else {
      // Melee damage: weapon damage + SB - (AP + TB)
      // Parse weapon damage string
      const damageStr = weapon.damage || "";
      
      // Handle formats like "+SB+4", "+SB+2", etc.
      let weaponBonus = 0;
      
      try {
        if (damageStr.includes("+SB+")) {
          // Extract the bonus after SB
          const parts = damageStr.split("+SB+");
          if (parts.length > 1) {
            weaponBonus = parseInt(parts[1]) || 0;
          }
        }
      } catch (parseError) {
        console.error("calculateDamage: Error parsing weapon damage string", damageStr, parseError);
        weaponBonus = 0; // Default to 0 on parse error
      }
      
      baseDamage = safeCharacterSB + weaponBonus;
    }
    
    // Critical hit detection (Requirements 1.4, 1.5, 1.6)
    let isCritical = false;
    let successLevel = 0;
    let criticalBonus = 0;
    
    // Only check for critical if attack succeeded (roll <= testValue)
    if (safeTestValue !== undefined && attackRoll <= safeTestValue) {
      // Calculate Success Level: (testValue - attackRoll) / 10, rounded down
      successLevel = Math.floor((safeTestValue - attackRoll) / 10);
      
      // Check for doubles (tens digit == units digit)
      const tensDigit = Math.floor(attackRoll / 10);
      const unitsDigit = attackRoll % 10;
      const isDoubles = tensDigit === unitsDigit;
      
      // Check for multiples of 10 (10, 20, 30, etc.)
      const isMultipleOf10 = attackRoll % 10 === 0 && attackRoll > 0;
      
      // Check if weapon has Impale quality
      const hasImpale = weapon.qualities && weapon.qualities.toLowerCase().includes("impale");
      
      // Critical hit conditions:
      // 1. Doubles (11, 22, 33, etc.) for all weapons
      // 2. Multiples of 10 (10, 20, 30, etc.) for Impale weapons (custom house rule)
      if (isDoubles || (hasImpale && isMultipleOf10)) {
        isCritical = true;
        criticalBonus = successLevel;
      }
    }
    
    // Apply armor and toughness reduction
    const reduction = safeTargetAP + safeTargetTB;
    const finalDamage = Math.max(0, baseDamage + criticalBonus - reduction);
    
    return {
      error: false,
      weapon: weapon,
      targetAP: safeTargetAP,
      targetTB: safeTargetTB,
      attackRoll: attackRoll,
      testValue: safeTestValue,
      baseDamage: baseDamage,
      reduction: reduction,
      isCritical: isCritical,
      successLevel: successLevel,
      criticalBonus: criticalBonus,
      finalDamage: finalDamage,
      isRanged: isRanged,
      rangedAtMeleeDistance: rangedAtMeleeDistance,
      meleeDistancePenalty: meleeDistancePenalty,
      isPistol: isPistol,
      requiresCoolTest: rangedAtMeleeDistance, // Cool test required for non-pistol ranged at melee
    };
  } catch (error) {
    // Catch-all error handler (Requirement 19.4, 19.6)
    console.error("calculateDamage: Unexpected error", error);
    return {
      error: true,
      errorMessage: `Calculation error: ${error.message}`,
      weapon: weapon,
      targetAP: targetAP || 0,
      targetTB: targetTB || 0,
      attackRoll: attackRoll || 0,
      testValue: testValue || 0,
      baseDamage: 0,
      reduction: 0,
      isCritical: false,
      successLevel: 0,
      criticalBonus: 0,
      finalDamage: 0,
      isRanged: false,
      rangedAtMeleeDistance: false,
      meleeDistancePenalty: 0,
      isPistol: false,
      requiresCoolTest: false,
    };
  }
}

/* ══════════ CONDITION MANAGEMENT ══════════ */

/**
 * Apply a condition to a character
 * 
 * Handles:
 * - Adding new conditions to active conditions list
 * - Stacking for stackable conditions (Ablaze, Bleeding, Fatigued)
 * - Tracking condition source and duration
 * - Respecting maximum levels for stackable conditions
 * 
 * Requirements: 2.2, 2.3
 * 
 * @param {Object} character - The character object with conditions array
 * @param {string} conditionName - Name of the condition to apply
 * @param {string} source - What caused the condition (e.g., "Critical Hit", "Spell", "Fire")
 * @param {string} duration - Duration of the condition (e.g., "end of round", "until healed")
 * @returns {Object} Updated character object (immutable update)
 */
function applyCondition(character, conditionName, source = "", duration = "") {
  // Find the condition definition from CONDITIONS constant
  const conditionDef = CONDITIONS.find(c => c.name === conditionName);
  
  if (!conditionDef) {
    console.error(`Unknown condition: ${conditionName}`);
    return character;
  }
  
  // Use default duration if not specified
  const finalDuration = duration || conditionDef.defaultDuration;
  
  // Check if character already has this condition
  const existingConditionIndex = character.conditions.findIndex(c => c.name === conditionName);
  
  if (existingConditionIndex !== -1) {
    // Condition already exists
    const existingCondition = character.conditions[existingConditionIndex];
    
    if (conditionDef.stackable) {
      // Stackable condition - increment level up to maxLevel
      const newLevel = Math.min(existingCondition.level + 1, conditionDef.maxLevel);
      
      // Create updated condition
      const updatedCondition = {
        ...existingCondition,
        level: newLevel,
        source: source || existingCondition.source, // Update source if provided
        duration: finalDuration,
      };
      
      // Create new conditions array with updated condition
      const newConditions = [...character.conditions];
      newConditions[existingConditionIndex] = updatedCondition;
      
      return {
        ...character,
        conditions: newConditions,
      };
    } else {
      // Non-stackable condition - already exists, just update source/duration if provided
      const updatedCondition = {
        ...existingCondition,
        source: source || existingCondition.source,
        duration: finalDuration,
      };
      
      const newConditions = [...character.conditions];
      newConditions[existingConditionIndex] = updatedCondition;
      
      return {
        ...character,
        conditions: newConditions,
      };
    }
  } else {
    // New condition - add to conditions array
    const newCondition = {
      name: conditionName,
      level: 1,
      source: source,
      duration: finalDuration,
    };
    
    return {
      ...character,
      conditions: [...character.conditions, newCondition],
    };
  }
}

/**
 * Process end-of-round condition effects
 * 
 * Handles:
 * - Bleeding: reduce wounds by condition level
 * - Ablaze: reduce wounds by condition level
 * - Fatigued: reduce Movement by condition level
 * - Remove conditions with "end of round" duration
 * - Apply Unconscious when wounds <= 0
 * 
 * Requirements: 2.4, 2.5, 2.6, 2.8, 2.9
 * 
 * @param {Object} character - The character object with conditions array
 * @returns {Object} Updated character object with processed conditions and wound/movement changes
 */
function processEndOfRoundConditions(character) {
  let updatedCharacter = { ...character };
  let totalWoundLoss = 0;
  const conditionsToRemove = [];
  
  // Process each active condition
  for (let i = 0; i < updatedCharacter.conditions.length; i++) {
    const condition = updatedCharacter.conditions[i];
    
    // Process Bleeding: lose 1 wound per level
    if (condition.name === "Bleeding") {
      totalWoundLoss += condition.level;
    }
    
    // Process Ablaze: lose 1 wound per level
    if (condition.name === "Ablaze") {
      totalWoundLoss += condition.level;
    }
    
    // Process Fatigued: reduce Movement by level
    // Movement -1 per level, Walk -2 per level, Run -4 per level
    if (condition.name === "Fatigued") {
      updatedCharacter = {
        ...updatedCharacter,
        move: {
          m: Math.max(0, (updatedCharacter.move?.m || 0) - condition.level),
          w: Math.max(0, (updatedCharacter.move?.w || 0) - (condition.level * 2)),
          r: Math.max(0, (updatedCharacter.move?.r || 0) - (condition.level * 4)),
        }
      };
    }
    
    // Check for conditions with "end of round" duration
    if (condition.duration && condition.duration.toLowerCase().includes("end of round")) {
      conditionsToRemove.push(i);
    }
  }
  
  // Apply wound loss
  if (totalWoundLoss > 0) {
    const newWounds = (updatedCharacter.wCur || 0) - totalWoundLoss;
    updatedCharacter = {
      ...updatedCharacter,
      wCur: newWounds,
    };
    
    // Apply Unconscious condition if wounds drop to 0 or below
    if (newWounds <= 0) {
      // Check if Unconscious condition already exists
      const hasUnconscious = updatedCharacter.conditions.some(c => c.name === "Unconscious");
      
      if (!hasUnconscious) {
        updatedCharacter = applyCondition(updatedCharacter, "Unconscious", "Wounds dropped to 0", "Until healed");
      }
    }
  }
  
  // Remove expired conditions (iterate in reverse to avoid index issues)
  if (conditionsToRemove.length > 0) {
    const newConditions = updatedCharacter.conditions.filter((_, index) => !conditionsToRemove.includes(index));
    updatedCharacter = {
      ...updatedCharacter,
      conditions: newConditions,
    };
  }
  
  return updatedCharacter;
}

/* ══════════ CRITICAL WOUND MANAGEMENT ══════════ */

/**
 * Record a critical wound
 * 
 * Creates a CriticalWound object and adds it to the character's critical wound history.
 * Also adds the critical wound as a special condition.
 * 
 * Requirements: 16.1, 16.2, 16.3, 16.4, 16.5, 16.8
 * 
 * @param {Object} character - The character object
 * @param {string} location - Hit location (head, body, arm, leg)
 * @param {string} description - Description of the critical wound
 * @param {string} effects - Mechanical effects of the wound
 * @param {string} duration - Duration type (permanent, temporary, or specific duration)
 * @param {number} severity - Severity value (typically from critical table roll)
 * @returns {Object} Updated character object with critical wound added
 * 
 * Preconditions:
 * - location is one of: head, body, arm, leg
 * - description is non-empty string
 * - effects describes the mechanical impact
 * - duration indicates how long the wound lasts
 * - severity is a positive integer
 * 
 * Postconditions:
 * - Critical wound is added to character.criticalWounds array
 * - Critical wound is added as a condition with special formatting
 * - Wound is marked as active (healed: false)
 * - Timestamp is recorded
 */
function recordCriticalWound(character, location, description, effects, duration, severity) {
  const criticalWound = {
    id: Date.now(), // Unique identifier
    timestamp: Date.now(),
    location: location,
    description: description,
    effects: effects,
    duration: duration,
    severity: severity,
    healed: false,
  };
  
  // Add to critical wounds array
  const updatedCharacter = {
    ...character,
    criticalWounds: [...(character.criticalWounds || []), criticalWound],
  };
  
  // Add as a special condition
  const conditionName = `Critical Wound (${location})`;
  const conditionSource = `${description} (Severity ${severity})`;
  
  return applyCondition(updatedCharacter, conditionName, conditionSource, duration);
}

/**
 * Mark a critical wound as healed
 * 
 * Sets the healed flag on a critical wound and removes it from active conditions.
 * The wound remains in the history for record-keeping.
 * 
 * Requirements: 16.6, 16.7
 * 
 * @param {Object} character - The character object
 * @param {number} criticalWoundId - The unique ID of the critical wound to heal
 * @returns {Object} Updated character object with critical wound marked as healed
 * 
 * Preconditions:
 * - criticalWoundId exists in character.criticalWounds
 * 
 * Postconditions:
 * - Critical wound with matching ID has healed set to true
 * - Corresponding condition is removed from active conditions
 * - Wound remains in criticalWounds array for history
 */
function healCriticalWound(character, criticalWoundId) {
  // Find and update the critical wound
  const updatedCriticalWounds = character.criticalWounds.map(wound => {
    if (wound.id === criticalWoundId) {
      return { ...wound, healed: true, healedAt: Date.now() };
    }
    return wound;
  });
  
  // Find the wound to get its location for condition removal
  const healedWound = character.criticalWounds.find(w => w.id === criticalWoundId);
  
  if (!healedWound) {
    return character; // Wound not found, return unchanged
  }
  
  // Remove the corresponding condition
  const conditionName = `Critical Wound (${healedWound.location})`;
  const updatedConditions = character.conditions.filter(c => 
    !(c.name === conditionName && c.source && c.source.includes(`Severity ${healedWound.severity}`))
  );
  
  let updatedCharacter = {
    ...character,
    criticalWounds: updatedCriticalWounds,
    conditions: updatedConditions,
  };
  
  // INTEGRATION 1: Log the critical wound healing
  updatedCharacter = logCriticalWoundHealing(updatedCharacter, healedWound);
  
  return updatedCharacter;
}

/**
 * Get active critical wounds
 * 
 * Returns only the critical wounds that are not yet healed.
 * 
 * Requirements: 16.7
 * 
 * @param {Object} character - The character object
 * @returns {Array} Array of active (unhealed) critical wounds
 */
function getActiveCriticalWounds(character) {
  return (character.criticalWounds || []).filter(wound => !wound.healed);
}

/* ══════════ ADVANTAGE MANAGEMENT ══════════ */

/**
 * Increment Advantage with bounds checking
 * 
 * Increases character's Advantage by 1, respecting the maximum bound of 10.
 * Records the new value in session Advantage history.
 * 
 * Requirements: 3.2, 3.6, 3.8
 * 
 * @param {Object} character - The character object with advantage and sessionState
 * @returns {Object} Updated character object with incremented advantage
 */
function incrementAdvantage(character) {
  // Ensure advantage doesn't exceed 10
  const newAdvantage = Math.min(character.advantage + 1, 10);
  
  // Update advantage history in session state
  const newAdvantageHistory = [...character.sessionState.advantageHistory, newAdvantage];
  
  let updatedCharacter = {
    ...character,
    advantage: newAdvantage,
    sessionState: {
      ...character.sessionState,
      advantageHistory: newAdvantageHistory,
    },
  };
  
  // INTEGRATION 3: Track maximum advantage reached
  if (character.sessionState.active) {
    updatedCharacter = trackMaxAdvantage(updatedCharacter, newAdvantage);
  }
  
  return updatedCharacter;
}

/**
 * Decrement Advantage with bounds checking
 * 
 * Decreases character's Advantage by 1, respecting the minimum bound of 0.
 * Records the new value in session Advantage history.
 * 
 * Requirements: 3.2, 3.5, 3.8
 * 
 * @param {Object} character - The character object with advantage and sessionState
 * @returns {Object} Updated character object with decremented advantage
 */
function decrementAdvantage(character) {
  // Ensure advantage doesn't go below 0
  const newAdvantage = Math.max(character.advantage - 1, 0);
  
  // Update advantage history in session state
  const newAdvantageHistory = [...character.sessionState.advantageHistory, newAdvantage];
  
  return {
    ...character,
    advantage: newAdvantage,
    sessionState: {
      ...character.sessionState,
      advantageHistory: newAdvantageHistory,
    },
  };
}

/**
 * Set Advantage to a specific value with bounds checking
 * 
 * Sets character's Advantage to a specific value, respecting bounds (0-10).
 * Records the new value in session Advantage history.
 * 
 * Requirements: 3.1, 3.5, 3.6, 3.8
 * 
 * @param {Object} character - The character object with advantage and sessionState
 * @param {number} value - The new advantage value to set
 * @returns {Object} Updated character object with updated advantage
 */
function setAdvantage(character, value) {
  // Ensure advantage is within bounds (0-10)
  const newAdvantage = Math.max(0, Math.min(value, 10));
  
  // Update advantage history in session state
  const newAdvantageHistory = [...character.sessionState.advantageHistory, newAdvantage];
  
  let updatedCharacter = {
    ...character,
    advantage: newAdvantage,
    sessionState: {
      ...character.sessionState,
      advantageHistory: newAdvantageHistory,
    },
  };
  
  // INTEGRATION 3: Track maximum advantage reached
  if (character.sessionState.active) {
    updatedCharacter = trackMaxAdvantage(updatedCharacter, newAdvantage);
  }
  
  return updatedCharacter;
}

/**
 * Reset Advantage to 0
 * 
 * Resets character's Advantage to 0 (typically at end of combat).
 * Records the reset in session Advantage history.
 * 
 * Requirements: 3.1, 3.5
 * 
 * @param {Object} character - The character object with advantage and sessionState
 * @returns {Object} Updated character object with advantage reset to 0
 */
function resetAdvantage(character) {
  // Update advantage history in session state
  const newAdvantageHistory = [...character.sessionState.advantageHistory, 0];
  
  return {
    ...character,
    advantage: 0,
    sessionState: {
      ...character.sessionState,
      advantageHistory: newAdvantageHistory,
    },
  };
}

/* ══════════ WOUND MANAGEMENT FUNCTIONS ══════════ */

/**
 * Update current wounds with validation
 * 
 * Updates the character's current wounds, ensuring:
 * - Current wounds don't exceed maximum wounds
 * - Negative wounds are tracked
 * - Unconscious condition is applied at 0 wounds
 * 
 * Requirements: 15.2, 15.3, 15.4, 15.7
 * 
 * @param {Object} character - The character object
 * @param {number} newWounds - The new current wounds value
 * @returns {Object} Updated character object with new wounds value
 */
function updateWounds(character, newWounds) {
  const maxWounds = calculateMaxWounds(character);
  
  // Prevent current wounds from exceeding maximum
  const boundedWounds = Math.min(newWounds, maxWounds);
  
  let updatedCharacter = {
    ...character,
    wCur: boundedWounds,
  };
  
  // Apply Unconscious condition if wounds drop to 0 or below
  if (boundedWounds <= 0) {
    const hasUnconscious = updatedCharacter.conditions.some(c => c.name === "Unconscious");
    if (!hasUnconscious) {
      updatedCharacter = applyCondition(updatedCharacter, "Unconscious", "Wounds dropped to 0", "Until healed");
    }
  } else {
    // Remove Unconscious condition if wounds are above 0
    updatedCharacter = {
      ...updatedCharacter,
      conditions: updatedCharacter.conditions.filter(c => c.name !== "Unconscious"),
    };
  }
  
  return updatedCharacter;
}

/**
 * Calculate maximum wounds
 * 
 * Calculates the character's maximum wounds based on:
 * - Strength Bonus (wSB)
 * - Toughness Bonus × 2 (wTB2)
 * - Willpower Bonus (wWPB)
 * - Hardy talent bonus (wHardy)
 * 
 * Requirements: 15.1
 * 
 * @param {Object} character - The character object
 * @returns {number} Maximum wounds value
 */
function calculateMaxWounds(character) {
  return calculateTotalWounds(character).total;
}

/**
 * Calculate negative wounds
 * 
 * Calculates how many wounds below 0 the character is.
 * Used for death threshold tracking.
 * 
 * Requirements: 15.4
 * 
 * @param {Object} character - The character object
 * @returns {number} Number of wounds below 0 (positive number), or 0 if not negative
 */
function calculateNegativeWounds(character) {
  const currentWounds = character.wCur || 0;
  return currentWounds < 0 ? Math.abs(currentWounds) : 0;
}

/**
 * Get wound threshold status
 * 
 * Determines if character is at a wound threshold (50% or 25%).
 * Used for displaying warnings.
 * 
 * Requirements: 15.5
 * 
 * @param {Object} character - The character object
 * @returns {Object} { threshold: string|null, percentage: number, color: string }
 */
function getWoundThreshold(character) {
  const maxWounds = calculateMaxWounds(character);
  const currentWounds = character.wCur || 0;
  
  if (maxWounds === 0) {
    return { threshold: null, percentage: 0, color: "#8a3a2a" };
  }
  
  const percentage = (currentWounds / maxWounds) * 100;
  
  if (percentage <= 0) {
    return { threshold: "critical", percentage: 0, color: "#8a3a2a" };
  } else if (percentage <= 25) {
    return { threshold: "25%", percentage, color: "#8a3a2a" };
  } else if (percentage <= 50) {
    return { threshold: "50%", percentage, color: "#8a7a2a" };
  } else {
    return { threshold: null, percentage, color: "#5a7a3a" };
  }
}

/**
 * Calculate session wound loss
 * 
 * Calculates total wounds lost during the current session.
 * 
 * Requirements: 15.9
 * 
 * @param {Object} character - The character object
 * @returns {number} Total wounds lost during session
 */
function calculateSessionWoundLoss(character) {
  if (!character.sessionState.active) {
    return 0;
  }
  
  const woundsAtStart = character.sessionState.woundsAtStart || 0;
  const currentWounds = character.wCur || 0;
  
  return Math.max(0, woundsAtStart - currentWounds);
}

/* ══════════ CHARACTERISTIC ADVANCEMENT FUNCTIONS ══════════ */

/**
 * Calculate the XP cost for an advancement based on the WFRP 4e tiered cost table.
 *
 * @param {string} type - The advancement type: "characteristic", "skill", or "talent"
 * @param {number} currentAdvances - Current number of advances (or times taken for talents)
 * @param {boolean} inCareer - Whether the advancement is in the current career scheme
 * @returns {number} The XP cost for the advancement (doubled if out-of-career)
 */
function getAdvancementCost(type, currentAdvances, inCareer) {
  let baseCost;

  if (type === 'characteristic') {
    const tiers = [[5,25],[10,30],[15,40],[20,50],[25,70],[30,90],[35,120],[40,150],[45,190],[50,230],[55,280],[60,330],[65,390],[70,450]];
    baseCost = 520; // default for 70+
    for (const [threshold, cost] of tiers) {
      if (currentAdvances <= threshold) {
        baseCost = cost;
        break;
      }
    }
  } else if (type === 'skill') {
    const tiers = [[5,10],[10,15],[15,20],[20,30],[25,40],[30,60],[35,80],[40,110],[45,140],[50,180],[55,220],[60,270],[65,320],[70,380]];
    baseCost = 440; // default for 70+
    for (const [threshold, cost] of tiers) {
      if (currentAdvances <= threshold) {
        baseCost = cost;
        break;
      }
    }
  } else if (type === 'talent') {
    baseCost = 100 * (currentAdvances + 1);
  } else {
    return 0;
  }

  return inCareer ? baseCost : baseCost * 2;
}

/**
 * Calculate the cost and count for a bulk advancement of up to `maxBulk` advances.
 *
 * Iterates up to `maxBulk` times, calling `getAdvancementCost` for each projected
 * advance, accumulating costs while within the XP budget and absolute max.
 *
 * @param {string} type - 'characteristic' or 'skill'
 * @param {number} currentAdvances - Current number of advances (>= 0)
 * @param {number} availableXP - Character's current XP (>= 0)
 * @param {boolean} inCareer - Whether the advancement is in-career
 * @param {number} [maxBulk=5] - Maximum advances to attempt (> 0)
 * @param {number} [absoluteMax] - Hard cap on total advances (e.g. 100 for characteristics)
 * @returns {{ count: number, totalCost: number, perAdvanceCosts: number[] }}
 *
 * Preconditions:
 * - type must be 'characteristic' or 'skill'
 * - currentAdvances >= 0
 * - availableXP >= 0
 * - maxBulk > 0
 *
 * Postconditions:
 * - count <= maxBulk
 * - totalCost <= availableXP
 * - perAdvanceCosts.length === count
 */
function calculateBulkAdvancement(type, currentAdvances, availableXP, inCareer, maxBulk = 5, absoluteMax) {
  let count = 0;
  let totalCost = 0;
  const perAdvanceCosts = [];

  for (let i = 0; i < maxBulk; i++) {
    // Respect absolute maximum if defined
    if (absoluteMax !== undefined && currentAdvances + count >= absoluteMax) {
      break;
    }

    const nextCost = getAdvancementCost(type, currentAdvances + i, inCareer);

    if (totalCost + nextCost > availableXP) {
      break;
    }

    totalCost += nextCost;
    perAdvanceCosts.push(nextCost);
    count++;
  }

  return { count, totalCost, perAdvanceCosts };
}

/**
 * Advance a characteristic using XP
 * 
 * Calculates XP cost using the WFRP 4e tiered cost table (Core Rulebook pp. 44–45).
 * The cost per advance depends on the current number of advances:
 *   Advances 0–5: 25 XP | 6–10: 30 XP | 11–15: 40 XP | 16–20: 50 XP
 *   21–25: 70 XP | 26–30: 90 XP | 31–35: 120 XP | 36–40: 150 XP
 *   41–45: 190 XP | 46–50: 230 XP | 51–55: 280 XP | 56–60: 330 XP
 *   61–65: 390 XP | 66–70: 450 XP | 70+: 520 XP
 * Out-of-career characteristics cost double the in-career rate.
 * 
 * Validates sufficient XP is available before applying the advancement.
 * Creates an advancement log entry with timestamp.
 * 
 * @param {Object} character - The character object
 * @param {string} characteristic - The characteristic to advance (WS, BS, S, T, I, Ag, Dex, Int, WP, Fel)
 * @param {string[]} careerScheme - Array of characteristics available in current career level
 * @returns {Object} AdvancementResult with success, message, xpCost, and updatedCharacter
 * 
 * Preconditions:
 * - characteristic is one of: WS, BS, S, T, I, Ag, Dex, Int, WP, Fel
 * - character.chars[characteristic] exists
 * - character.xpCur is non-negative integer
 * - careerScheme is an array of characteristic names
 * 
 * Postconditions:
 * - Returns AdvancementResult with success boolean and xpCost
 * - xpCost is looked up from the WFRP 4e tiered cost table via getAdvancementCost()
 * - Out-of-career cost is 2× the in-career tiered cost
 * - If xpCur < xpCost, success = false
 * - If success = true, advancement is applied and log entry created
 * 
 * **Validates: Requirements 4.1-4.8**
 */
function advanceCharacteristic(character, characteristic, careerScheme) {
  // Validate characteristic exists
  if (!character.chars[characteristic]) {
    return {
      success: false,
      message: `Invalid characteristic: ${characteristic}`,
      xpCost: 0,
      updatedCharacter: character,
    };
  }

  // Get current advances
  const currentAdvances = character.chars[characteristic].a;
  const currentValue = character.chars[characteristic].i + currentAdvances;

  // Check if characteristic is in career scheme
  const inCareer = careerScheme.includes(characteristic);

  // Calculate XP cost using WFRP 4e tiered cost table
  const xpCost = getAdvancementCost('characteristic', currentAdvances, inCareer);

  // Validate sufficient XP available
  if (character.xpCur < xpCost) {
    return {
      success: false,
      message: `Insufficient XP. Required: ${xpCost}, Available: ${character.xpCur}`,
      xpCost: xpCost,
      updatedCharacter: character,
    };
  }

  // Apply advancement
  const newAdvances = currentAdvances + 1;
  const newValue = character.chars[characteristic].i + newAdvances;

  // Update XP values
  const newXpCur = character.xpCur - xpCost;
  const newXpSpent = character.xpSpent + xpCost;

  // Create advancement log entry
  const logEntry = {
    timestamp: Date.now(),
    type: 'characteristic',
    name: characteristic,
    from: currentValue,
    to: newValue,
    xpCost: xpCost,
    careerLevel: character.careerLevel,
    inCareer: inCareer,
  };

  // Return updated character with advancement applied
  let updatedCharacter = {
    ...character,
    chars: {
      ...character.chars,
      [characteristic]: {
        ...character.chars[characteristic],
        a: newAdvances,
      },
    },
    xpCur: newXpCur,
    xpSpent: newXpSpent,
    advancementLog: [...character.advancementLog, logEntry],
  };
  
  // Check if archiving is needed (Requirement 20.1)
  if (needsArchiving(updatedCharacter)) {
    updatedCharacter = archiveAdvancementLog(updatedCharacter);
  }

  return {
    success: true,
    message: `${characteristic} advanced from ${currentValue} to ${newValue} (${inCareer ? 'in-career' : 'out-of-career'}, ${xpCost} XP)`,
    xpCost: xpCost,
    updatedCharacter: updatedCharacter,
  };
}

/**
 * Advance a skill by one level
 * 
 * XP cost is determined by the WFRP 4e tiered cost table based on current advances:
 *   Advances 0-5: 10 XP | 6-10: 15 XP | 11-15: 20 XP | 16-20: 30 XP
 *   21-25: 40 XP | 26-30: 60 XP | 31-35: 80 XP | 36-40: 110 XP
 *   41-45: 140 XP | 46-50: 180 XP | 51-55: 220 XP | 56-60: 270 XP
 *   61-65: 320 XP | 66-70: 380 XP | 70+: 440 XP
 * Out-of-career skills cost double the in-career rate.
 * 
 * @param {Object} character - The character object
 * @param {string} skillName - Name of the skill to advance
 * @param {Array<string>} careerScheme - Array of skill names in current career scheme
 * @returns {Object} AdvancementResult with success, message, xpCost, and updatedCharacter
 * 
 * Preconditions:
 * - skillName is a valid skill name
 * - character.bSkills and character.aSkills exist
 * - character.xpCur is non-negative integer
 * - careerScheme is an array of skill names
 * 
 * Postconditions:
 * - Returns AdvancementResult with success boolean and xpCost
 * - xpCost is looked up from the WFRP 4e skill tiered cost table via getAdvancementCost('skill', currentAdvances, inCareer)
 * - Out-of-career cost is 2× the in-career tiered cost
 * - If xpCur < xpCost, success = false
 * - If success = true, advancement is applied and log entry created
 * 
 * **Validates: Requirements 5.1-5.6**
 */
function advanceSkill(character, skillName, careerScheme) {
  // Find the skill in bSkills or aSkills
  let skillIndex = -1;
  let skillArray = null;
  let arrayName = null;
  
  // Search in basic skills
  skillIndex = character.bSkills.findIndex(s => s.n === skillName);
  if (skillIndex !== -1) {
    skillArray = character.bSkills;
    arrayName = 'bSkills';
  } else {
    // Search in advanced skills
    skillIndex = character.aSkills.findIndex(s => s.n === skillName);
    if (skillIndex !== -1) {
      skillArray = character.aSkills;
      arrayName = 'aSkills';
    }
  }
  
  // Validate skill exists
  if (skillIndex === -1 || !skillArray) {
    return {
      success: false,
      message: `Skill not found: ${skillName}`,
      xpCost: 0,
      updatedCharacter: character,
    };
  }
  
  const skill = skillArray[skillIndex];
  const currentAdvances = skill.a;
  
  // Check if skill is in career scheme
  const inCareer = careerScheme.includes(skillName);
  
  // Calculate XP cost using tiered table lookup
  const xpCost = getAdvancementCost('skill', currentAdvances, inCareer);
  
  // Validate sufficient XP available
  if (character.xpCur < xpCost) {
    return {
      success: false,
      message: `Insufficient XP. Required: ${xpCost}, Available: ${character.xpCur}`,
      xpCost: xpCost,
      updatedCharacter: character,
    };
  }
  
  // Apply advancement
  const newAdvances = currentAdvances + 1;
  
  // Update XP values
  const newXpCur = character.xpCur - xpCost;
  const newXpSpent = character.xpSpent + xpCost;
  
  // Create advancement log entry
  const logEntry = {
    timestamp: Date.now(),
    type: 'skill',
    name: skillName,
    from: currentAdvances,
    to: newAdvances,
    xpCost: xpCost,
    careerLevel: character.careerLevel,
    inCareer: inCareer,
  };
  
  // Create updated skill array
  const updatedSkillArray = [...skillArray];
  updatedSkillArray[skillIndex] = {
    ...skill,
    a: newAdvances,
  };
  
  // Return updated character with advancement applied
  let updatedCharacter = {
    ...character,
    [arrayName]: updatedSkillArray,
    xpCur: newXpCur,
    xpSpent: newXpSpent,
    advancementLog: [...character.advancementLog, logEntry],
  };
  
  // Check if archiving is needed (Requirement 20.1)
  if (needsArchiving(updatedCharacter)) {
    updatedCharacter = archiveAdvancementLog(updatedCharacter);
  }
  
  return {
    success: true,
    message: `${skillName} advanced from ${currentAdvances} to ${newAdvances} (${inCareer ? 'in-career' : 'out-of-career'}, ${xpCost} XP)`,
    xpCost: xpCost,
    updatedCharacter: updatedCharacter,
  };
}

/**
 * Acquire a talent for the character using XP.
 * Cost scales with times already taken: 100 × (timesTaken + 1) XP for in-career,
 * doubled to 200 × (timesTaken + 1) XP for out-of-career.
 * (e.g., 1st purchase = 100/200 XP, 2nd = 200/400 XP, 3rd = 300/600 XP)
 * 
 * @param {Object} character - The character object
 * @param {string} talentName - Name of the talent to acquire
 * @param {Array<string>} careerScheme - List of in-career talents
 * @returns {Object} AcquisitionResult with success, message, xpCost, updatedCharacter
 * 
 * **Validates: Requirements 6.1-6.6**
 */
function acquireTalent(character, talentName, careerScheme) {
  // Validate talent name is provided
  if (!talentName || talentName.trim() === '') {
    return {
      success: false,
      message: 'Talent name is required',
      xpCost: 0,
      updatedCharacter: character,
    };
  }
  
  // Check if talent is in career scheme
  const inCareer = careerScheme.includes(talentName);
  
  // Find if talent already exists (for multi-level talents)
  const existingTalentIndex = character.talents.findIndex(t => t.n === talentName);
  let currentLevel = 0;
  
  if (existingTalentIndex !== -1) {
    currentLevel = character.talents[existingTalentIndex].t || 0;
  }
  
  // Calculate XP cost using tiered advancement cost lookup
  const xpCost = getAdvancementCost('talent', currentLevel, inCareer);
  
  // Validate sufficient XP available
  if (character.xpCur < xpCost) {
    return {
      success: false,
      message: `Insufficient XP. Required: ${xpCost}, Available: ${character.xpCur}`,
      xpCost: xpCost,
      updatedCharacter: character,
    };
  }
  
  const newLevel = currentLevel + 1;
  
  // Update XP values
  const newXpCur = character.xpCur - xpCost;
  const newXpSpent = character.xpSpent + xpCost;
  
  // Create advancement log entry
  const logEntry = {
    timestamp: Date.now(),
    type: 'talent',
    name: talentName,
    from: currentLevel,
    to: newLevel,
    xpCost: xpCost,
    careerLevel: character.careerLevel,
    inCareer: inCareer,
  };
  
  // Create updated talents array
  let updatedTalents;
  if (existingTalentIndex !== -1) {
    // Update existing talent level
    updatedTalents = [...character.talents];
    updatedTalents[existingTalentIndex] = {
      ...character.talents[existingTalentIndex],
      t: newLevel,
    };
  } else {
    // Add new talent
    // Get talent description from TALENT_DB if available
    const talentData = TALENT_DB.find(t => t.name === talentName);
    const desc = talentData ? talentData.desc : '';
    
    updatedTalents = [
      ...character.talents,
      { n: talentName, t: 1, d: desc }
    ];
  }
  
  // Return updated character with talent acquired
  let updatedCharacter = {
    ...character,
    talents: updatedTalents,
    xpCur: newXpCur,
    xpSpent: newXpSpent,
    advancementLog: [...character.advancementLog, logEntry],
  };
  
  // Check if archiving is needed (Requirement 20.1)
  if (needsArchiving(updatedCharacter)) {
    updatedCharacter = archiveAdvancementLog(updatedCharacter);
  }
  
  // Sync talent bonuses into characteristic bonus fields (Requirement 5.3)
  updatedCharacter = syncTalentBonuses(updatedCharacter);
  
  return {
    success: true,
    message: `${talentName} acquired at level ${newLevel} (${inCareer ? 'in-career' : 'out-of-career'}, ${xpCost} XP)`,
    xpCost: xpCost,
    updatedCharacter: updatedCharacter,
  };
}

/* ══════════ ADVANCEMENT LOG ARCHIVING FUNCTIONS ══════════ */

/**
 * Check if advancement log needs archiving (exceeds 100 entries).
 * 
 * @param {Object} character - The character object
 * @returns {boolean} True if log exceeds 100 entries
 * 
 * **Validates: Requirement 20.1**
 */
function needsArchiving(character) {
  return character.advancementLog && character.advancementLog.length > 100;
}

/**
 * Archive old advancement log entries, keeping the most recent 100 active.
 * Moves older entries to advancementLogArchive array.
 * 
 * @param {Object} character - The character object
 * @returns {Object} Updated character with archived log entries
 * 
 * Preconditions:
 * - character.advancementLog exists and has > 100 entries
 * - character.advancementLogArchive exists (or will be created)
 * 
 * Postconditions:
 * - advancementLog contains only the most recent 100 entries
 * - Older entries are moved to advancementLogArchive
 * - Total count (active + archived) remains the same
 * - Entries are sorted by timestamp (oldest first in archive)
 * 
 * **Validates: Requirements 20.1, 20.2, 20.3**
 */
function archiveAdvancementLog(character) {
  // Ensure advancementLog exists
  if (!character.advancementLog || character.advancementLog.length <= 100) {
    return character;
  }
  
  // Sort log by timestamp (oldest first)
  const sortedLog = [...character.advancementLog].sort((a, b) => a.timestamp - b.timestamp);
  
  // Calculate how many entries to archive
  const entriesToArchive = sortedLog.length - 100;
  
  // Split into archived and active
  const toArchive = sortedLog.slice(0, entriesToArchive);
  const activeLog = sortedLog.slice(entriesToArchive);
  
  // Merge with existing archive (if any)
  const existingArchive = character.advancementLogArchive || [];
  const newArchive = [...existingArchive, ...toArchive].sort((a, b) => a.timestamp - b.timestamp);
  
  return {
    ...character,
    advancementLog: activeLog,
    advancementLogArchive: newArchive,
  };
}

/**
 * Get total count of advancement log entries (active + archived).
 * 
 * @param {Object} character - The character object
 * @returns {Object} Object with activeCount, archivedCount, and totalCount
 * 
 * **Validates: Requirement 20.4**
 */
function getAdvancementLogCounts(character) {
  const activeCount = character.advancementLog ? character.advancementLog.length : 0;
  const archivedCount = character.advancementLogArchive ? character.advancementLogArchive.length : 0;
  
  return {
    activeCount,
    archivedCount,
    totalCount: activeCount + archivedCount,
  };
}

/**
 * Get all advancement log entries (active + archived) sorted by timestamp.
 * Used for export and full log viewing.
 * 
 * @param {Object} character - The character object
 * @returns {Array} All advancement log entries sorted by timestamp (newest first)
 * 
 * **Validates: Requirement 20.5**
 */
function getAllAdvancementLogEntries(character) {
  const activeLog = character.advancementLog || [];
  const archivedLog = character.advancementLogArchive || [];
  
  // Combine and sort by timestamp (newest first for display)
  return [...activeLog, ...archivedLog].sort((a, b) => b.timestamp - a.timestamp);
}

/**
 * INTEGRATION 4: Auto-suggest talents based on conditions frequently suffered
 * 
 * Analyzes condition history and suggests relevant talents that could help.
 * 
 * @param {Object} character - The character object
 * @returns {Array} Array of suggested talent names with reasons
 */
function suggestTalentsFromConditions(character) {
  const suggestions = [];
  
  // Count condition occurrences in advancement log
  const conditionCounts = {};
  (character.advancementLog || []).forEach(entry => {
    if (entry.type === 'event' && entry.name === 'Condition Applied') {
      const condition = entry.condition;
      conditionCounts[condition] = (conditionCounts[condition] || 0) + 1;
    }
  });
  
  // Suggest talents based on frequent conditions
  if (conditionCounts['Bleeding'] >= 3) {
    suggestions.push({
      talent: 'Clot',
      reason: `You've suffered Bleeding ${conditionCounts['Bleeding']} times. Clot heals 1 Bleeding per level at round end.`,
    });
  }
  
  if (conditionCounts['Unconscious'] >= 2) {
    suggestions.push({
      talent: 'Hardy',
      reason: `You've been Unconscious ${conditionCounts['Unconscious']} times. Hardy increases your Wounds.`,
    });
    suggestions.push({
      talent: 'Robust',
      reason: `You've been Unconscious ${conditionCounts['Unconscious']} times. Robust helps you resist damage.`,
    });
  }
  
  if (conditionCounts['Stunned'] >= 3) {
    suggestions.push({
      talent: 'Combat Reflexes',
      reason: `You've been Stunned ${conditionCounts['Stunned']} times. Combat Reflexes improves initiative.`,
    });
  }
  
  if (conditionCounts['Fatigued'] >= 3) {
    suggestions.push({
      talent: 'Relentless',
      reason: `You've been Fatigued ${conditionCounts['Fatigued']} times. Relentless helps resist fatigue.`,
    });
  }
  
  return suggestions;
}

/**
 * INTEGRATION 5: Track XP spending patterns and suggest career progression
 * 
 * Analyzes which characteristics/skills are being advanced most and shows
 * progress toward career level completion.
 * 
 * @param {Object} character - The character object
 * @returns {Object} Analysis of advancement patterns and career progress
 */
function analyzeAdvancementPatterns(character) {
  const patterns = {
    characteristicAdvances: {},
    skillAdvances: {},
    talentsAcquired: [],
    totalXPSpent: 0,
    careerProgress: null,
  };
  
  // Analyze advancement log
  (character.advancementLog || []).forEach(entry => {
    if (entry.type === 'characteristic') {
      patterns.characteristicAdvances[entry.name] = 
        (patterns.characteristicAdvances[entry.name] || 0) + 1;
      patterns.totalXPSpent += entry.xpCost || 0;
    } else if (entry.type === 'skill') {
      patterns.skillAdvances[entry.name] = 
        (patterns.skillAdvances[entry.name] || 0) + 1;
      patterns.totalXPSpent += entry.xpCost || 0;
    } else if (entry.type === 'talent') {
      patterns.talentsAcquired.push(entry.name);
      patterns.totalXPSpent += entry.xpCost || 0;
    }
  });
  
  // Calculate career progress using three-condition check against actual character data
  const careerScheme = getCareerScheme(character.career, character.careerLevel);
  if (careerScheme) {
    const thresholds = { level1: 5, level2: 10, level3: 15, level4: 20 };
    const threshold = thresholds[character.careerLevel] || 5;

    // Check characteristics: each career characteristic must have advances >= threshold
    const charDetails = careerScheme.characteristics.map(charAbbr => ({
      name: charAbbr,
      current: (character.chars[charAbbr] && character.chars[charAbbr].a) || 0,
      required: threshold,
      met: ((character.chars[charAbbr] && character.chars[charAbbr].a) || 0) >= threshold
    }));
    const allCharsMet = charDetails.every(d => d.met);

    // Check skills: at least 8 career skills must have advances >= threshold
    const allSkills = [...(character.bSkills || []), ...(character.aSkills || [])];
    const skillDetails = careerScheme.skills.map(skillName => {
      const skill = allSkills.find(s => s.n === skillName);
      const current = skill ? skill.a : 0;
      return {
        name: skillName,
        current,
        required: threshold,
        met: current >= threshold
      };
    });
    const skillsCompleted = skillDetails.filter(d => d.met).length;
    const skillsMet = skillsCompleted >= 8;

    // Check talents: at least 1 career talent must be acquired (talent.t >= 1)
    const acquiredTalents = (character.talents || []).filter(
      tal => careerScheme.talents.includes(tal.n) && tal.t >= 1
    ).map(tal => tal.n);
    const talentMet = acquiredTalents.length >= 1;

    patterns.careerProgress = {
      threshold,
      characteristics: {
        met: allCharsMet,
        details: charDetails,
        total: charDetails.length,
        completed: charDetails.filter(d => d.met).length
      },
      skills: {
        met: skillsMet,
        details: skillDetails,
        total: skillDetails.length,
        completed: skillsCompleted,
        required: 8
      },
      talents: {
        met: talentMet,
        acquired: acquiredTalents
      },
      readyToProgress: allCharsMet && skillsMet && talentMet,
    };
  }
  
  return patterns;
}

/* ══════════ CAREER ADVANCEMENT FUNCTIONS ══════════ */

/**
 * Calculate XP cost for career level advancement
 * 
 * @param {Object} character - The character object
 * @returns {number} XP cost (100 if complete, 200 if incomplete, 0 if at level4)
 * 
 * Requirements: 2.1, 2.2
 */
function calculateCareerAdvancementCost(character) {
  // Check if at max level
  if (character.careerLevel === "level4") {
    return 0;
  }
  
  // Get career progress
  const progress = analyzeAdvancementPatterns(character);
  if (!progress.careerProgress) {
    return 0;
  }
  
  // Return cost based on completion
  return progress.careerProgress.readyToProgress ? 100 : 200;
}

/**
 * Advance character to next career level
 * 
 * @param {Object} character - The character object
 * @returns {Object} Result with success, message, xpCost, updatedCharacter
 * 
 * Requirements: 2.1-2.11
 */
function advanceCareerLevel(character) {
  // 1. Validate current level is not max
  if (character.careerLevel === "level4") {
    return {
      success: false,
      message: "Already at maximum career level",
      xpCost: 0,
      updatedCharacter: character
    };
  }
  
  // 2. Get career progress
  const progress = analyzeAdvancementPatterns(character);
  if (!progress.careerProgress) {
    return {
      success: false,
      message: "Career scheme not found",
      xpCost: 0,
      updatedCharacter: character
    };
  }
  
  const readyToProgress = progress.careerProgress.readyToProgress;
  const advancesCompleted = readyToProgress;
  
  // 3. Calculate XP cost
  const xpCost = readyToProgress ? 100 : 200;
  
  // 4. Validate sufficient XP
  if (character.xpCur < xpCost) {
    return {
      success: false,
      message: `Insufficient XP. Required: ${xpCost}, Available: ${character.xpCur}`,
      xpCost: xpCost,
      updatedCharacter: character
    };
  }
  
  // 5. Determine next level
  const levelMap = {
    "level1": "level2",
    "level2": "level3",
    "level3": "level4"
  };
  const currentLevel = character.careerLevel;
  const nextLevel = levelMap[currentLevel];
  
  if (!nextLevel) {
    return {
      success: false,
      message: "Invalid career level",
      xpCost: 0,
      updatedCharacter: character
    };
  }
  
  // 6. Update character
  const updatedCharacter = {
    ...character,
    careerLevel: nextLevel,
    status: getStatusForCareerLevel(character.career, nextLevel),
    xpCur: character.xpCur - xpCost,
    xpSpent: character.xpSpent + xpCost,
    advancementLog: [
      ...character.advancementLog,
      {
        timestamp: Date.now(),
        type: "career_level_advancement",
        from: currentLevel,
        to: nextLevel,
        career: character.career,
        xpCost: xpCost,
        advancesCompleted: advancesCompleted,
        careerLevel: nextLevel,
        inCareer: true
      }
    ]
  };
  
  return {
    success: true,
    message: `Advanced to ${nextLevel}`,
    xpCost: xpCost,
    updatedCharacter: updatedCharacter
  };
}

/* ══════════ CAREER SWITCHING FUNCTIONS ══════════ */

/**
 * Calculate XP cost for career switching
 * 
 * @param {Object} character - The character object
 * @param {string} newCareer - Name of the new career
 * @param {string} newClass - Career class of the new career
 * @returns {number} XP cost (100-300 based on completion and class)
 * 
 * Requirements: 4.2, 4.3, 4.4, 4.5
 */
function calculateCareerSwitchCost(character, newCareer, newClass) {
  // Get career progress for completion status
  const progress = analyzeAdvancementPatterns(character);
  const isComplete = progress.careerProgress?.readyToProgress || false;
  
  // Base cost depends on completion
  const baseCost = isComplete ? 100 : 200;
  
  // Add 100 XP if switching to different class
  const currentClass = character.class;
  const classPenalty = (currentClass !== newClass) ? 100 : 0;
  
  return baseCost + classPenalty;
}

/**
 * Recalculate in-career status for all advancements
 * 
 * This function does NOT modify the advancement log history.
 * It only affects future XP costs for advancing the same
 * characteristics/skills/talents again.
 * 
 * @param {Object} character - The character object
 * @returns {Object} Updated character with recalculated advancement costs
 * 
 * Requirements: 4.13
 */
function recalculateInCareerStatus(character) {
  // NOTE: We do NOT modify the advancement log history
  // The historical inCareer values are preserved
  // This function only affects FUTURE advancement costs
  
  // The existing advancement functions (advanceCharacteristic, advanceSkill, acquireTalent)
  // already check the current career scheme to determine in-career status
  // So no additional state needs to be stored
  
  // Simply return the character unchanged
  // Future advancements will automatically use the new career scheme
  return character;
}

/**
 * Switch character to a different career
 * 
 * @param {Object} character - The character object
 * @param {string} newCareer - Name of the new career
 * @returns {Object} Result with success, message, xpCost, updatedCharacter
 * 
 * Requirements: 4.1-4.14
 */
function switchCareer(character, newCareer) {
  // 1. Validate new career exists
  if (!CAREER_SCHEMES[newCareer]) {
    return {
      success: false,
      message: `Invalid career: ${newCareer}`,
      xpCost: 0,
      updatedCharacter: character
    };
  }
  
  // 2. Validate not switching to same career
  if (character.career === newCareer) {
    return {
      success: false,
      message: `Already in career: ${newCareer}`,
      xpCost: 0,
      updatedCharacter: character
    };
  }
  
  // 3. Get new career's class
  const newClass = CAREER_SCHEMES[newCareer].class;
  
  // 4. Get career progress for completion status
  const progress = analyzeAdvancementPatterns(character);
  const readyToProgress = progress.careerProgress?.readyToProgress || false;
  
  // 5. Calculate XP cost
  const xpCost = calculateCareerSwitchCost(character, newCareer, newClass);
  
  // 6. Validate sufficient XP
  if (character.xpCur < xpCost) {
    return {
      success: false,
      message: `Insufficient XP. Required: ${xpCost}, Available: ${character.xpCur}`,
      xpCost: xpCost,
      updatedCharacter: character
    };
  }
  
  // 7. Update character
  const previousCareer = character.career;
  const previousLevel = character.careerLevel;
  
  let updatedCharacter = {
    ...character,
    career: newCareer,
    careerLevel: "level1",
    class: newClass,
    status: getStatusForCareerLevel(newCareer, "level1"),
    xpCur: character.xpCur - xpCost,
    xpSpent: character.xpSpent + xpCost,
    advancementLog: [
      ...character.advancementLog,
      {
        timestamp: Date.now(),
        type: "career_switch",
        from: previousCareer,
        to: newCareer,
        previousLevel: previousLevel,
        newLevel: "level1",
        xpCost: xpCost,
        careerLevel: "level1",
        inCareer: true
      }
    ]
  };
  
  // 8. Update career path
  updatedCharacter = updateCareerPath(updatedCharacter, newCareer);
  
  // 9. Recalculate in-career status (affects future advancement costs)
  updatedCharacter = recalculateInCareerStatus(updatedCharacter);
  
  return {
    success: true,
    message: `Switched to ${newCareer}`,
    xpCost: xpCost,
    updatedCharacter: updatedCharacter
  };
}

/**
 * INTEGRATION 6: Auto-apply conditions when critical wound is recorded
 * 
 * Enhanced version of recordCriticalWound that automatically applies
 * appropriate ongoing conditions based on the wound type.
 * 
 * @param {Object} character - The character object
 * @param {string} location - Hit location
 * @param {string} description - Wound description
 * @param {string} effects - Mechanical effects
 * @param {string} duration - Duration type
 * @param {number} severity - Severity value
 * @returns {Object} Updated character with wound and conditions
 */
function recordCriticalWoundWithConditions(character, location, description, effects, duration, severity) {
  // First record the critical wound normally
  let updatedCharacter = recordCriticalWound(character, location, description, effects, duration, severity);
  
  // Auto-apply additional conditions based on wound description
  const desc = description.toLowerCase();
  
  // Bleeding wounds
  if (desc.includes('bleed') || desc.includes('arterial') || desc.includes('severed')) {
    updatedCharacter = applyCondition(updatedCharacter, 'Bleeding', 'Critical Wound', duration, Math.min(3, Math.floor(severity / 10)));
  }
  
  // Stunning wounds (head injuries)
  if (location === 'head' && (desc.includes('concuss') || desc.includes('dazed') || desc.includes('stunned'))) {
    updatedCharacter = applyCondition(updatedCharacter, 'Stunned', 'Critical Wound', 'end of round', 1);
  }
  
  // Blinding wounds
  if (desc.includes('blind') || desc.includes('eye')) {
    updatedCharacter = applyCondition(updatedCharacter, 'Blinded', 'Critical Wound', duration, 1);
  }
  
  // Entangling wounds (limb injuries)
  if ((location === 'arm' || location === 'leg') && (desc.includes('broken') || desc.includes('shattered'))) {
    updatedCharacter = applyCondition(updatedCharacter, 'Entangled', 'Critical Wound', duration, 1);
  }
  
  return updatedCharacter;
}

/**
 * INTEGRATION 7: Enhanced export with session history
 * 
 * Extends export to include session history tracking across multiple sessions.
 * This allows tracking character growth across many gaming sessions.
 * 
 * @param {Object} character - The character object
 * @returns {Object} Character with session history initialized
 */
function initializeSessionHistory(character) {
  if (!character.sessionHistory) {
    return {
      ...character,
      sessionHistory: [],
    };
  }
  return character;
}

/**
 * INTEGRATION 7 (helper): Add completed session to history
 */
function addSessionToHistory(character, sessionSummary) {
  const sessionHistory = character.sessionHistory || [];
  
  return {
    ...character,
    sessionHistory: [...sessionHistory, sessionSummary],
  };
}
